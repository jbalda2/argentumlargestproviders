  host.appendChild(el(`<p class="lede">A different map than the footprint above: where the largest providers are <strong>based</strong> — by number of companies and by total units headquartered in each state (${YMAX}). Management-led operators are often based in one state while operating across a region.</p>`));
  const py=DATA.providers.filter(p=>p.year===YMAX);
  const hq={}; py.forEach(p=>{const s=hqState(p.loc); if(!s)return;(hq[s]=hq[s]||{n:0,units:0}); hq[s].n++; hq[s].units+=p.units||0;});
  const hqArr=Object.entries(hq).map(([st,v])=>({st,...v}));
  const byCount=hqArr.slice().sort((a,b)=>b.n-a.n||b.units-a.units).slice(0,14);
  const byUnits=hqArr.slice().sort((a,b)=>b.units-a.units).slice(0,14);
  const reported=py.filter(p=>hqState(p.loc)).length;
  const hgrid=el('<div class="grid two-col"></div>');
  hgrid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Operators by HQ state (${YMAX})</h3><p class="note">Number of largest-providers companies headquartered in each state.</p><div class="chart-wrap">${svgHBars(byCount.map(x=>({label:x.st,value:x.n,color:C.blue})),{w:540,rh:18,lw:42,clip:22,fv:fmt})}</div></div>`));
  hgrid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Units by HQ state (${YMAX})</h3><p class="note">Total reported units of companies headquartered in each state.</p><div class="chart-wrap">${svgHBars(byUnits.map(x=>({label:x.st,value:x.units,color:C.gold})),{w:540,rh:18,lw:42,clip:34,fv:v=>(v/1000).toFixed(0)+'k'})}</div></div>`));
  host.appendChild(hgrid);
  host.appendChild(el(`<p class="mini" style="margin-top:6px">${reported} of ${py.length} ${YMAX} providers reported a parseable "City, ST" HQ. HQ concentration is distinct from operating footprint — a company based in one state may operate regionally or nationally.</p>`));
}
function geoVal(s,y){return s['c'+y];}
function bucketColor(v,max){
  if(v==null||v===0)return '#33445e';
  const r=v/max; const a=0.25+0.75*Math.min(1,r);
  return `rgba(254,197,43,${a.toFixed(2)})`;
}
function drawGeo(){
  const states=DATA.geo_states.filter(s=>geoVal(s,geoYear)!=null&&s.st!=='BC');
  const max=Math.max(...states.map(s=>geoVal(s,geoYear)||0))||1;
  const valByState={}; states.forEach(s=>valByState[s.st]=s);
  // map
  let paths='';
  for(const code in STATE_PATHS){
    const s=valByState[code]; const v=s?geoVal(s,geoYear):null;
    const fill=v?bucketColor(v,max):'#33445e';
    const cls='state'+(v?'':' empty')+(geoSel===code?' sel':'');
    paths+=`<path class="${cls}" data-st="${code}" d="${STATE_PATHS[code]}" fill="${fill}"/>`;
  }
  $('#geoMap').innerHTML=`<svg viewBox="0 0 959 593" preserveAspectRatio="xMidYMid meet">${paths}</svg>
    <div class="legend" style="margin-top:10px"><span>Communities:</span>
      <div><span class="sw" style="background:rgba(254,197,43,.3)"></span>fewer</div>
      <div><span class="sw" style="background:rgba(254,197,43,1)"></span>more (max ${fmt(max)})</div>
      <div><span class="sw" style="background:#33445e"></span>none reported</div></div>`;
  const tip=$('#maptip');
  $('#geoMap').querySelectorAll('path.state').forEach(p=>{
    const code=p.dataset.st; const s=valByState[code];
    p.onmousemove=e=>{tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';
      tip.innerHTML=`<strong>${code}</strong> — ${s?fmt(geoVal(s,geoYear)):'0'} communities${s?` · ${fmt(s['p'+geoYear])} providers`:''}`;};
    p.onmouseleave=()=>tip.style.display='none';
    if(s&&geoVal(s,geoYear)) p.onclick=()=>{geoSel=geoSel===code?null:code;drawGeo();drawGeoDrill();};
  });
  // table
  const sorted=states.slice().sort((a,b)=>(geoVal(b,geoYear)||0)-(geoVal(a,geoYear)||0));
  let h=`<thead><tr><th class="no-sort">State</th><th class="no-sort">Communities</th><th class="no-sort">Providers</th></tr></thead><tbody>`;
  sorted.forEach(s=>{h+=`<tr class="row-click ${geoSel===s.st?'':''}" data-st="${s.st}"${geoSel===s.st?' style="background:var(--panel2)"':''}><td>${s.st}</td><td>${fmt(geoVal(s,geoYear))}</td><td>${fmt(s['p'+geoYear])}</td></tr>`;});
  h+='</tbody>';
  $('#geoTable').innerHTML=h;
  $('#geoTable').querySelectorAll('tr.row-click').forEach(tr=>tr.onclick=()=>{const c=tr.dataset.st;geoSel=geoSel===c?null:c;drawGeo();drawGeoDrill();});
  const tot=states.reduce((a,s)=>a+(geoVal(s,geoYear)||0),0);
  const active=states.filter(s=>geoVal(s,geoYear)>0).length;
  $('#geoLegend').textContent=`${active} states · ${fmt(tot)} communities reported (${geoYear})`;
  drawGeoDrill();
}
function drawGeoDrill(){
  const d=$('#geoDrill'); if(!d)return;
  if(!geoSel){d.innerHTML='';return;}
  const sr=DATA.geo_states.find(s=>s.st===geoSel);
  const ops=DATA.geo_detail.filter(g=>g.st===geoSel&&g.year===geoYear&&g.c).sort((a,b)=>(b.c||0)-(a.c||0));
  const cThis=sr?sr['c'+geoYear]:null, cPrev=sr?sr['c'+(geoYear-1)]:null, pThis=sr?sr['p'+geoYear]:null;
  const ranked=DATA.geo_states.filter(s=>s.st!=='BC'&&(s['c'+geoYear]||0)>0).sort((a,b)=>(b['c'+geoYear]||0)-(a['c'+geoYear]||0));
  const rank=ranked.findIndex(s=>s.st===geoSel)+1;
  const card=el('<div class="card"></div>');
  card.appendChild(el(`<h3 style="margin:0 0 2px">Senior-living footprint — ${geoSel} (${geoYear})</h3><p class="note" style="color:var(--muted);font-size:12px;margin:0 0 12px">Reported communities and operating providers, largest-providers survey. ${ops.length} providers reported communities in ${geoSel} this year. Click an operator for its full profile.</p>`));
  const mg=el('<div class="mgrid" style="margin-bottom:6px"></div>');
  const stat=(l,v,sub)=>mg.appendChild(el(`<div class="mstat"><div class="l">${l}</div><div class="vv">${v}</div>${sub?`<div class="mini" style="margin-top:3px">${sub}</div>`:''}</div>`));
  stat('Communities',fmt(cThis),cPrev!=null?`${deltaSpan(cThis,cPrev)} vs ${geoYear-1}`:'');
  stat('Providers',fmt(pThis),'operating here');
  stat('Rank among states',rank?'#'+rank+' of '+ranked.length:'—','by communities');
  card.appendChild(mg);
  const row=el('<div class="grid two-col" style="margin-top:8px"></div>');
  row.appendChild(el(`<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Communities 2024–2026</h4><div class="chart-wrap">${svgLine([{name:'Communities',color:C.gold,pts:[2024,2025,2026].map(y=>[y,sr?sr['c'+y]:null]),area:true}],{w:380,h:180,zero:true,xs:[2024,2025,2026],fy:fmt,fp:fmt})}</div></div>`));
  const opWrap=el('<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Top operators by communities</h4></div>');
  const max=ops.length?ops[0].c:1;
  ops.slice(0,10).forEach(o=>{const r=el(`<div class="stat-row row-click" style="cursor:pointer;gap:8px"><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(o.provider)}</span><div class="barline" style="flex:0 0 80px"><div class="fill" style="width:${(o.c/max*100).toFixed(0)}%;background:${C.teal}"></div></div><span class="v" style="flex:0 0 38px;text-align:right">${fmt(o.c)}</span></div>`);r.onclick=()=>openProvider(o.provider,geoYear);opWrap.appendChild(r);});
  if(!ops.length)opWrap.appendChild(el('<p class="mini">No per-provider detail reported for this state/year.</p>'));
  row.appendChild(opWrap);
  card.appendChild(row);
  // movers within state 2024 -> 2026
  const by={};
  [2024,2026].forEach(y=>DATA.geo_detail.filter(g=>g.st===geoSel&&g.year===y).forEach(g=>{const k=canon(g.provider);(by[k]=by[k]||{})['y'+y]={n:g.provider,c:g.c||0};}));
  const movers=Object.values(by).map(o=>{const a=o.y2024,b=o.y2026;return {n:(b||a).n,d:(b?b.c:0)-(a?a.c:0)};}).filter(m=>m.d!==0);
  const gain=movers.filter(m=>m.d>0).sort((a,b)=>b.d-a.d).slice(0,8);
  const lose=movers.filter(m=>m.d<0).sort((a,b)=>a.d-b.d).slice(0,8);
  if(gain.length||lose.length){
    const m2=el('<div class="grid two-col" style="margin-top:14px"></div>');
    if(gain.length)m2.appendChild(el(`<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Biggest community gains, 2024→2026</h4><div class="chart-wrap">${svgHBars(gain.map(m=>({label:m.n,value:m.d,color:C.green})),{w:380,rh:18,lw:150,clip:22,fv:v=>'+'+fmt(v)})}</div></div>`));
    if(lose.length)m2.appendChild(el(`<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Biggest declines, 2024→2026</h4><div class="chart-wrap">${svgHBars(lose.map(m=>({label:m.n,value:Math.abs(m.d),color:C.red})),{w:380,rh:18,lw:150,clip:22,fv:v=>'-'+fmt(v)})}</div></div>`));
    card.appendChild(m2);
    card.appendChild(el(`<p class="mini" style="margin-top:10px">Movers are name-matched within ${geoSel} across 2024 and 2026; coverage depends on which providers reported per-state detail each year.</p>`));
  }
  d.innerHTML=''; d.appendChild(card);
}

function ownershipReporters(){

const median=arr=>{const s=arr.filter(v=>v!=null).sort((a,b)=>a-b);if(!s.length)return null;const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
function dominantModel(o){
  const c=[['owned',o.owned],['manage',o.manage],['ridea',o.ridea],['lease',o.lease]].filter(x=>x[1]!=null&&x[1]>=0&&x[1]<=1);

/* care archetype by dominant segment (report rule: AL or IL >=50%, or MC >=45%, else Diversified) */
function archetypeOf(r){
  const t=(r.al||0)+(r.il||0)+(r.mc||0); if(!t)return null;
  const al=(r.al||0)/t, il=(r.il||0)/t, mc=(r.mc||0)/t;
  if(mc>=0.45)return 'mc'; if(al>=0.5)return 'al'; if(il>=0.5)return 'il'; return 'div';
}
const ARCH_LABEL={il:'Independent-Living / Campus',al:'Assisted-Living-Led',mc:'Memory-Care-Led',div:'Diversified'};
const ARCH_COLOR={il:C.blue,div:C.teal,al:C.orange,mc:C.violet};
const ARCH_ORDER=['il','div','al','mc'];
/* operator size bands (report definition, by units) */
function sizeBandOf(u){if(u==null)return null;if(u<2500)return 'small';if(u<5000)return 'mid';if(u<10000)return 'large';return 'mega';}
const SIZE_LABEL={small:'Small (<2,500)',mid:'Mid (2,500–5,000)',large:'Large (5,000–10,000)',mega:'Mega (10,000+)'};
const SIZE_ORDER=['small','mid','large','mega'];

  map:{total:1516515,al:697535,il:572916,mc:246064,operators:7829,buildings:25800,members:142,member_units:472496} // NIC MAP open units (Argentum NIC dataset)
};
/* Census region by USPS state code */
const STATE_REGION=(()=>{const m={};const put=(r,arr)=>arr.split(' ').forEach(s=>m[s]=r);
  put('Northeast','CT ME MA NH RI VT NJ NY PA');
  put('Midwest','IL IN MI OH WI IA KS MN MO NE ND SD');
  put('South','DE FL GA MD NC SC VA DC WV AL KY MS TN AR LA OK TX');
  put('West','AZ CO ID MT NV NM UT WY AK CA HI OR WA');return m;})();
const REGION_COLOR={Northeast:C.blue,Midwest:C.teal,South:C.orange,West:C.violet};
/* forward-sentiment text classifier (per-provider occ/portfolio expectations) */
function sentClass(t){t=(t||'').toLowerCase();if(!t.trim())return null;
  if(/decreas|declin|reduc|lower/.test(t))return 'dec';
  if(/increas|substan|grow|expand|rise|higher|up\b/.test(t))return 'inc';
  if(/same|flat|stable|maintain|steady|no change|unchang/.test(t))return 'same';
  return null;}
/* top-10/25/50 cumulative share of a metric, by year */
function topNShare(metric){
  return YEARS.map(y=>{
    const ps=DATA.providers.filter(p=>p.year===y&&p[metric]).sort((a,b)=>b[metric]-a[metric]);
    const tot=ps.reduce((s,p)=>s+p[metric],0)||1; const cum=n=>ps.slice(0,n).reduce((s,p)=>s+p[metric],0)/tot;
    return {year:y,t10:cum(10),t25:cum(25),t50:cum(50)};
  });
}
/* share of panel units by rank band (1–10 / 11–25 / 26–50 / 51–150), by year */
function rankBandShares(){
  return YEARS.map(y=>{
    const ps=DATA.providers.filter(p=>p.year===y&&p.units).sort((a,b)=>b.units-a.units);
    const tot=ps.reduce((s,p)=>s+p.units,0)||1; const band=(a,b)=>ps.slice(a,b).reduce((s,p)=>s+p.units,0)/tot;
    return {year:y,b1:band(0,10),b2:band(10,25),b3:band(25,50),b4:band(50,150)};
  });
}
/* share of panel units by care archetype, by year */
function archetypeShares(){
  return YEARS.map(y=>{
    const ps=DATA.providers.filter(p=>p.year===y&&p.units);
    const tot=ps.reduce((s,p)=>s+p.units,0)||1; const o={year:y};
    ARCH_ORDER.forEach(a=>o[a]=ps.filter(p=>archetypeOf(p)===a).reduce((s,p)=>s+p.units,0)/tot);
    return o;
  });
}
/* care-diversification index for one record: 0 = single-segment, 100 = perfectly even AL/IL/MC */
function diversIndex(r){
  const t=(r.al||0)+(r.il||0)+(r.mc||0); if(!t)return null;
  const a=(r.al||0)/t,i=(r.il||0)/t,m=(r.mc||0)/t, h=a*a+i*i+m*m;
  return (1-h)/(1-1/3)*100;
}
function diversTrend(){
  return YEARS.map(y=>{const v=DATA.providers.filter(p=>p.year===y).map(diversIndex).filter(x=>x!=null);return {year:y,idx:v.length?v.reduce((a,b)=>a+b,0)/v.length:null};});
}
/* parse a 2-letter HQ state from a "City, ST" location string */
function hqState(loc){const m=(loc||'').match(/,\s*([A-Za-z]{2})\b/);return m?m[1].toUpperCase():null;}
/* single-segment "pure-play" share of panel (one segment >=70% of AL+IL+MC), by year */
function purePlayShares(){
  return YEARS.map(y=>{
    const ps=DATA.providers.filter(p=>p.year===y&&((p.al||0)+(p.il||0)+(p.mc||0))>0);
    const pure=ps.filter(p=>{const t=(p.al||0)+(p.il||0)+(p.mc||0);return Math.max(p.al||0,p.il||0,p.mc||0)/t>=0.70;});
    return {year:y,share:ps.length?pure.length/ps.length:null,n:ps.length};
  });
}

function hoverBarList(items,opts){

    const e=entityByName(it.name);
    const pts=e?e.recs.filter(r=>r.units!=null&&r.year>=opts.y0&&r.year<=opts.y1).map(r=>[r.year,r.units]):[];
    const spark=pts.length>1?svgSpark(pts,opts.color,fmt):'<p class="mini" style="margin:4px 0 0">Single reported year in window — no trajectory.</p>';
    const row=el(`<div class="hrow"><span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name)}</span><div class="barline" style="flex:0 0 100px"><div class="fill" style="width:${(it.bar/max*100).toFixed(0)}%;background:${opts.color}"></div></div><span class="v" style="flex:0 0 60px;text-align:right">${opts.fv(it.val)}</span>
       <div class="pop"><div style="font-weight:600;margin-bottom:2px">${esc(it.name)}</div><div class="mini">${fmt(it.from)} → ${fmt(it.to)} units · ${growthSpan(it.to-it.from)} (${opts.y0}→${opts.y1})</div>${spark}</div></div>`);

function drawChurn(){

  const sumByYear=DATA.ccrc_summary.filter(s=>s.year>=spotFrom).sort((a,b)=>a.year-b.year);
  const grid=el('<div class="grid two-col"></div>');
  grid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Leading CCRC / Life Plan operators (${ccYearSel})</h3><div class="chart-wrap">${svgHBars(det.map(c=>({label:c.provider,value:c.n||0,color:C.teal})),{w:560,rh:20,lw:200,clip:30,fv:fmt})}</div></div>`));
  grid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Reported CCRCs over time</h3><p class="note">Total CCRCs and reporting operators each year (a subset of the list).</p><div class="legend" style="margin:2px 0 4px"><span><span class="sw" style="background:${C.teal}"></span>CCRCs</span><span style="margin-left:12px"><span class="sw" style="background:${C.gold}"></span>Operators</span></div><div class="chart-wrap">${svgGroupBars(sumByYear.map(s=>({label:s.year,vals:{c:s.ccrcs,p:s.providers}})),[{key:'c',name:'CCRCs',color:C.teal},{key:'p',name:'Operators',color:C.gold}],{h:240,fp:fmt})}</div></div>`));
  host.appendChild(grid);
  // FP/NFP cross-tab among CCRC operators
  const py=DATA.providers.filter(p=>p.year===ccYearSel||p.year===YMAX); const fpk={}; py.forEach(p=>{if(!fpk[norm(p.provider)])fpk[norm(p.provider)]=p.fpnfp;});
  const tab={FP:{ops:0,ccrcs:0},NFP:{ops:0,ccrcs:0},Other:{ops:0,ccrcs:0}};
  det.forEach(c=>{const f=fpk[norm(c.provider)]; const k=(f==='FP')?'FP':(f==='NFP'?'NFP':'Other'); tab[k].ops++; tab[k].ccrcs+=c.n||0;});
  const tot=det.reduce((s,c)=>s+(c.n||0),0)||1;
  host.appendChild(el(`<div class="card" style="margin-top:14px"><h3 style="font-size:14px;margin:0 0 4px">CCRC operators by tax status (${ccYearSel})</h3><p class="note" style="margin:0 0 8px">CCRC / Life Plan communities are disproportionately nonprofit — consistent with the owner-heavy, campus character of the segment.</p><table><thead><tr><th class="no-sort">Tax status</th><th class="no-sort">Operators</th><th class="no-sort">CCRCs</th><th class="no-sort">Share of CCRCs</th></tr></thead><tbody>${['NFP','FP','Other'].map(k=>tab[k].ops?`<tr><td>${k==='Other'?'Unclassified':(k==='NFP'?'Nonprofit':'For-profit')}</td><td>${tab[k].ops}</td><td>${tab[k].ccrcs}</td><td>${pct(tab[k].ccrcs/tot,0)}</td></tr>`:'').join('')}</tbody></table></div>`));
}

function drawWomenRoster(){
  const host=$('#womenRoster'); if(!host)return;
  const list=DATA.women_detail.filter(d=>d.year===womenYear).sort((a,b)=>a.provider.localeCompare(b.provider));
  const tot=(DATA.women.find(x=>x.year===womenYear)||{}).total;
  const cnt=$('#womenCount'); if(cnt)cnt.textContent=`${list.length}${tot?` of ${tot}`:''} providers · click a name for its profile`;
  host.innerHTML=`<div class="women-grid">`+list.map(d=>`<div class="wrow${d.matched?' row-click':''}"${d.matched?` data-p="${esc(d.provider).replace(/"/g,'&quot;')}"`:''}><div class="wn">${esc(d.provider)}</div>${d.ceo?`<div class="wc">${esc(d.ceo)}</div>`:''}</div>`).join('')+`</div>`;
  host.querySelectorAll('.row-click').forEach(r=>r.onclick=()=>openProvider(r.dataset.p,womenYear));
}

/* ---- About ---- */
RENDER.about=()=>{
  const root=$('#tab-about');
  const cov=DATA.trends.map(t=>`<tr><td>${t.year}</td><td>${fmt(t.providers)}</td><td>${fmt(t.n_comm_reporting)}</td><td>${fmt(t.n_seg_reporting)}</td><td>${fmt(t.total_units)}</td></tr>`).join('');
  root.innerHTML=`
   <h2 class="section">About this tool</h2>
   <div class="guide" style="max-width:920px">
     <div class="card">
       <h3>What this is</h3>
       <p>The <strong>Largest Providers Analysis</strong> tool turns Argentum's annual Largest Providers survey into an interactive view of the operators at the top of the senior-living field. It covers report years <strong>${YMIN}–${YMAX}</strong> — ${fmt(DATA.meta.n_records)} provider-year records — with aggregate scale, market concentration, care-segment mix, geography, capital structure, employment and forward sentiment.</p>
       <p class="mini">This is the market-intelligence module of Argentum's broader intelligence platform, alongside Workforce Intelligence and the State Legislative Tracker. It shares their look and feel and will fold into the unified platform.</p>
     </div>
     <div class="card">
       <h3>How to read the data</h3>
       <ul>
         <li><strong>Data timing.</strong> Each figure reflects the provider's self-report for that <strong>report-year edition</strong> of the Largest Providers list (${YMIN}–${YMAX}). The survey is compiled annually and the source workbook does <strong>not</strong> carry a single calendar "as-of" date — read each year as that edition's snapshot. Sub-series have narrower windows: geography 2024–2026, ownership a 2026 baseline, forward sentiment a 2026 baseline.</li>
         <li><strong>Aggregate metrics are the unit of analysis.</strong> All figures are provider self-reported; provider names are not formally linked across years, so single-company trends are directional only.</li>
         <li><strong>Concentration</strong> — Top-10/25/50 share = those providers' units ÷ total list units. <abbr title="${HHI_DEF}">HHI</abbr> = Σ(unit share)² × 10,000; every year sits far below the 1,500 "unconcentrated" benchmark, so the field is highly fragmented. <span class="mini">(Hover "HHI" for the full definition.)</span></li>
         <li><strong>Segment mix</strong> uses AL + IL + Memory Care as the denominator to neutralize uncategorized units. Early years rest on a smaller reporting base — read as directional.</li>
         <li><strong>Geography, ownership and growth</strong> are newer additions with partial-year coverage (see notes on each view).</li>
       </ul>
     </div>
     <div class="card">
       <h3>Coverage by year</h3>
       <table style="margin-top:6px"><thead><tr><th class="no-sort">Year</th><th class="no-sort">Providers w/ units</th><th class="no-sort">Reporting communities</th><th class="no-sort">Reporting AL/IL/MC</th><th class="no-sort">Total units</th></tr></thead><tbody>${cov}</tbody></table>
       <p class="mini" style="margin-top:8px">Geography reported by 100 (2024) / 98 (2025) / 84 (2026) providers. Ownership: 109 of 150 (2026). Forward sentiment: ~120 of 150 (2026).</p>
     </div>
     <div class="card">
       <h3>Measures & caveats</h3>
       <p><strong>Employment.</strong> Employees-per-unit is provider self-reported, incompletely reported, and definitionally inconsistent over time (2020 counts full-time + part-time; later years a single undefined headcount), and it varies with each operator's care mix — read it as a directional trend and relative comparison, not a precise ratio. See "How to read this data" on the Employment view.</p>
       <p>Aggregate <strong>ownership</strong> figures are recomputed from valid provider-level entries. Provider names are not formally linked across years, so the multi-year, fastest-growing and capital-vs-growth analyses are name-matched and directional.</p>
     </div>
     <div class="card">
       <h3>Source</h3>
       <p>Argentum Largest Providers survey, report years ${YMIN}–${YMAX}, from a single normalized master database. To extend with a new year, append rows to the master workbook and rebuild. <span class="beta" style="font-size:10px">BETA</span></p>
     </div>
   </div>`;
};

/* ----------------------------------------------------------- init */
function init(){
  $('#yrange').textContent=`${YMIN}–${YMAX}`;
  document.querySelectorAll('.yspan').forEach(e=>e.textContent=`${YMIN}–${YMAX}`);
  document.querySelectorAll('.updspan').forEach(e=>e.textContent=BUILD_DATE);
  buildNav();
  showTab('overview');
}
init();
</script>
