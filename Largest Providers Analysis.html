<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argentum Market Intelligence — Largest Providers</title>
<style>
  :root{
    /* Argentum brand palette — navy #0A2949 + gold #FEC52B (from official logo) */
    --bg:#0a2949; --panel:#123459; --panel2:#1a4069; --line:#2d5480;
    --txt:#e8eef5; --muted:#9fb3cf; --accent:#fec52b;
    --green:#3fa56e; --yellow:#e8b730; --red:#e2574b; --blue:#4aa3e0;
    --violet:#7d93d6; --orange:#e8924a; --teal:#3fb6c4; --grey:#7e90ad;
    --shadow:0 4px 18px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}

  header{background:linear-gradient(120deg,#0e3159,#091f38);padding:16px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative}
  .hdr-left{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
  #logo{height:42px}
  #logoPrint{display:none}
  .hdr-title{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;pointer-events:none}
  .hdr-title h1{margin:0;font-size:19px;font-weight:600;letter-spacing:.3px}
  .hdr-title .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .hdr-right{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
  .beta{background:var(--accent);color:#0a1c33;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;letter-spacing:.5px}
  .updated{color:var(--muted);font-size:11.5px}

  nav{display:flex;gap:2px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;flex-wrap:wrap}
  .navhead{background:none;border:none;color:var(--muted);padding:13px 15px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
  .navhead:hover{color:#fff}
  .navhead.active{color:#fff;border-bottom-color:var(--accent);font-weight:600}

  main{padding:22px 26px;max-width:1380px;margin:0 auto}
  .tab{display:none;animation:fade .25s ease}
  .tab.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  h2.section{font-size:16px;font-weight:600;margin:4px 0 4px}
  .lede{color:var(--muted);font-size:13px;margin:0 0 16px;max-width:880px;line-height:1.55}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(195px,1fr));margin-bottom:20px}
  .two-col{grid-template-columns:1fr 1fr}
  .three-col{grid-template-columns:repeat(3,1fr)}
  @media(max-width:980px){.two-col,.three-col{grid-template-columns:1fr}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative}
  .card.accent::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--accent);border-radius:12px 12px 0 0}
  .kpi .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;line-height:1.3;min-height:2.6em}
  .kpi .value{font-size:26px;font-weight:700;margin-top:6px;line-height:1.1}
  .kpi .sub{font-size:12px;margin-top:5px;color:var(--muted)}
  .kpi.click{cursor:pointer}
  .kpi.click:hover{border-color:var(--accent)}
  .kpi.click .label::after{content:" \25B8";color:var(--accent);font-weight:700}
  .kpi.hoverable{position:relative;cursor:default}
  .kpi.hoverable:hover{border-color:var(--accent)}
  .kpi .kpi-pop{position:absolute;left:-1px;right:-1px;top:100%;z-index:40;background:var(--panel2);border:1px solid var(--accent);border-radius:10px;padding:11px 13px;box-shadow:0 10px 28px rgba(0,0,0,.45);display:none;margin-top:5px}
  .kpi.hoverable:hover .kpi-pop{display:block}
  .kpi .kpi-pop .pop-tip{font-size:12px;color:var(--txt);line-height:1.5}
  .kpi .kpi-pop .pop-tip b{color:var(--accent)}
  .yrchip{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:13px;padding:2px 8px;font-size:11px;cursor:pointer}
  .ctl-break{flex-basis:100%;height:0}
  .yrchip.on{background:var(--accent);color:#0a1c33;border-color:var(--accent);font-weight:700}
  input[type=range]{accent-color:var(--accent)}
  .hrow{position:relative;display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:12.5px;border-bottom:1px solid var(--line)}
  .hrow:last-child{border-bottom:none}
  .hrow:hover{color:var(--accent)}
  .hrow .pop{position:absolute;left:0;top:100%;z-index:40;background:var(--panel2);border:1px solid var(--accent);border-radius:9px;padding:9px 11px;display:none;min-width:230px;box-shadow:0 10px 28px rgba(0,0,0,.45);color:var(--txt)}
  .hrow:hover .pop{display:block}
  abbr[title]{text-decoration:underline dotted;text-underline-offset:2px;cursor:help}
  .women-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;max-height:360px;overflow:auto;margin-top:2px}
  .wrow{padding:5px 2px;border-bottom:1px solid var(--line)}
  .wrow.row-click{cursor:pointer}
  .wrow.row-click:hover .wn{color:var(--accent)}
  .wrow .wn{font-size:12.5px;font-weight:500}
  .wrow .wc{font-size:11px;color:var(--muted)}
  @media(max-width:640px){.women-grid{grid-template-columns:1fr}}
  .v-green{color:var(--green)} .v-red{color:var(--red)} .v-blue{color:var(--blue)}
  .v-violet{color:var(--violet)} .v-gold{color:var(--accent)} .v-orange{color:var(--orange)}
  .v-grey{color:var(--grey)} .v-txt{color:var(--txt)}
  .delta-pos{color:var(--green)} .delta-neg{color:var(--red)} .delta-flat{color:var(--muted)}

  .chart-card h3{margin:0 0 4px;font-size:14px;font-weight:600}
  .chart-card .note{color:var(--muted);font-size:11.5px;margin:0 0 10px}
  .chart-wrap{width:100%;max-width:620px}
  .chart-wrap.wide{max-width:880px}
  svg{display:block;width:100%;height:auto;overflow:visible}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--panel2);z-index:5}
  th.no-sort{cursor:default}
  th:first-child,td:first-child{text-align:left}
  tbody tr:hover{background:var(--panel2)}
  td.name{font-weight:500;white-space:normal;text-align:left;min-width:150px;max-width:240px;line-height:1.25}
  th.name{text-align:left}
  .row-click{cursor:pointer}
  .tablecard{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .tablecard .inner{max-height:620px;overflow:auto}
  .arr{display:inline-block;width:11px;color:var(--accent)}

  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .pill.green{background:rgba(63,165,110,.16);color:#5dd29a}
  .pill.red{background:rgba(226,87,75,.16);color:#f3897f}
  .pill.blue{background:rgba(74,163,224,.16);color:#8fccf2}
  .pill.gold{background:rgba(254,197,43,.16);color:#fad669}
  .pill.grey{background:rgba(126,144,173,.16);color:#b6c4da}
  .pill.violet{background:rgba(125,147,214,.16);color:#aab8e8}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  input[type=text],select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
  input[type=text]{min-width:240px}
  input::placeholder{color:var(--muted)}
  .seg-toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg-toggle button{background:var(--panel2);border:none;color:var(--muted);padding:8px 14px;font-size:13px;cursor:pointer}
  .seg-toggle button.active{background:var(--accent);color:#0a1c33;font-weight:700}
  .seg-toggle button:not(:last-child){border-right:1px solid var(--line)}
  .csv-btn,.hdr-btn{border:1px solid var(--line);border-radius:8px;padding:8px 13px;font-size:12.5px;cursor:pointer;background:var(--panel2);color:var(--muted)}
  .csv-btn:hover{color:var(--txt);border-color:var(--accent)}
  .hdr-btn{background:var(--accent);color:#0a1c33;border:none;font-weight:700}
  .hdr-btn:hover{filter:brightness(1.1)}
  .legend-note{color:var(--muted);font-size:12px;margin-left:auto}
  .count-note{color:var(--muted);font-size:12px}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}

  /* meter / mix bars */
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;gap:12px}
  .stat-row:last-child{border-bottom:none}
  .stat-row .v{font-weight:700}
  .barline{flex:1;height:9px;background:#22344b;border-radius:6px;overflow:hidden;max-width:340px;border:1px solid var(--line)}
  .barline .fill{height:100%}

  /* geo */
  .geo-wrap{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
  @media(max-width:980px){.geo-wrap{grid-template-columns:1fr}}
  .state{stroke:#0a2949;stroke-width:1;cursor:pointer;transition:opacity .12s}
  .state.empty{fill:#33445e;cursor:default}
  .state:hover{stroke:#fff;stroke-width:1.5}
  .state.sel{stroke:var(--accent);stroke-width:2.2}
  #maptip{position:fixed;pointer-events:none;background:#0a1c33;border:1px solid var(--accent);border-radius:8px;padding:7px 11px;font-size:12.5px;z-index:200;display:none;box-shadow:var(--shadow)}

  /* growth / sentiment cards */
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
  .gcard h4{margin:0 0 3px;font-size:14px}
  .gcard .gmeta{color:var(--muted);font-size:12px;margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .gcard .gtext{font-size:12.5px;line-height:1.5;color:var(--txt)}
  .gcard .gfield{margin-top:8px}
  .gcard .gfield .lab{color:var(--accent);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  details.gacc{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:7px;box-shadow:var(--shadow)}
  details.gacc>summary{list-style:none;cursor:pointer;padding:10px 15px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  details.gacc>summary::-webkit-details-marker{display:none}
  details.gacc>summary::before{content:'▸';color:var(--accent);font-weight:700;font-size:12px;transition:transform .15s;flex:0 0 auto}
  details.gacc[open]>summary::before{transform:rotate(90deg)}
  details.gacc>summary:hover{background:var(--panel2);border-radius:10px}
  details.gacc>summary .gname{font-weight:600;font-size:14px}
  details.gacc .gbody{padding:4px 16px 14px 34px;border-top:1px solid var(--line);margin-top:2px}
  .cmp-chip{display:inline-flex;align-items:center;gap:7px;border-radius:18px;padding:5px 9px 5px 12px;font-size:12.5px;color:#0a1c33;font-weight:600}
  .cmp-chip button{background:none;border:none;color:rgba(10,28,51,.65);cursor:pointer;font-size:15px;line-height:1;padding:0;font-weight:700}
  .cmp-chip button:hover{color:#0a1c33}

  .findings li{margin:8px 0;line-height:1.55}
  .callout{background:rgba(74,163,224,.08);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:11px 15px;margin:12px 0;font-size:13px;line-height:1.55}
  .takeaway{background:rgba(254,197,43,.07);border:1px solid var(--accent);border-left:4px solid var(--accent);border-radius:10px;padding:12px 16px;margin:22px 0 4px}
  .takeaway .th{color:var(--accent);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
  .takeaway ul{margin:0;padding-left:18px} .takeaway li{margin:4px 0;font-size:13px;line-height:1.5}
  .takeaway b{color:var(--txt)}
  .mini{color:var(--muted);font-size:12px}
  .guide p{line-height:1.65;margin:8px 0} .guide h3{font-size:15px;margin:2px 0 8px}
  .guide ul{line-height:1.65}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(760px,100%);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0 0 3px;font-size:18px}
  .modal-head .sub{color:var(--muted);font-size:12.5px}
  .modal-x{background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1;padding:0 4px}
  .modal-x:hover{color:var(--txt)}
  .modal-body{overflow:auto;padding:16px 20px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:6px}
  .mstat{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .mstat .l{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;line-height:1.3;min-height:2.6em}
  .mstat .vv{font-size:18px;font-weight:700;margin-top:3px}
  .msec{margin-top:16px} .msec h4{margin:0 0 7px;font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}

  footer{color:var(--muted);font-size:11.5px;text-align:center;padding:24px;border-top:1px solid var(--line);margin-top:30px;line-height:1.6}

  @media print{
    :root{--bg:#fff;--panel:#fff;--panel2:#f4f6f9;--line:#cbd5e1;--txt:#0f1620;--muted:#475569;--shadow:none}
    body{background:#fff;color:#000}
    nav,.controls,.seg-toggle,.csv-btn,.hdr-btn,.legend-note,.modal,#logo,.beta{display:none!important}
    #logoPrint{display:block!important;height:40px}
    .hdr-title h1,.hdr-title .sub{color:#0a2949!important}
    header{background:#fff!important;border-bottom:1px solid #cbd5e1}
    .card,.tablecard,.gcard{box-shadow:none!important;border:1px solid #cbd5e1;break-inside:avoid}
    .tab{display:block!important}
  }
</style>
</head>

/* ----------------------------------------------------------- helpers */
const $ = (s,r=document)=>r.querySelector(s);
const C = {green:'#3fa56e',yellow:'#e8b730',red:'#e2574b',blue:'#4aa3e0',violet:'#7d93d6',grey:'#7e90ad',orange:'#e8924a',teal:'#3fb6c4',gold:'#fec52b',txt:'#e8eef5',muted:'#9fb3cf',line:'#2d5480'};
const YEARS = DATA.meta.years;
const HHI_DEF = "Herfindahl-Hirschman Index — the sum of every operator's squared % market share (0–10,000). Below 1,500 = unconcentrated; 1,500–2,500 = moderately concentrated; above 2,500 = highly concentrated. Squaring makes it sensitive to large players.";
const YMAX = DATA.meta.year_max, YMIN = DATA.meta.year_min;
const fmt = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('en-US');
const fmt1 = n => (n==null||isNaN(n))?'—':(Math.round(n*10)/10).toLocaleString('en-US');
const pct = (x,d=1)=> (x==null||isNaN(x))?'—':(x*100).toFixed(d)+'%';
const pp = (x,d=1)=> (x==null||isNaN(x))?'—':((x>=0?'+':'')+(x*100).toFixed(d)+' pts');
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el = (html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;};
const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');

const trendBy = {}; DATA.trends.forEach(t=>trendBy[t.year]=t);
const T = trendBy[YMAX], T0 = trendBy[YMIN];

/* ----------------------------------------------------------- multi-year entity matching
   Provider names are not formally linked across years (the workbook's Crosswalk is a blank
   scaffold). We name-match on a normalized key + a small high-confidence alias map for known
   renames / typos, and strip trailing dedupe digits. Everything built on this is labelled
   "name-matched, directional." */
const ALIAS={
  'lifecareserviceslcs':'lcs',
  'kaplandevelopmentgroup':'kaplanseniorliving',
  'kaplanseniorlivingformerlykaplandevelopmentgroup':'kaplanseniorliving',
  'cogirmanagementusainc':'cogirseniorliving',
  'agemarkseniorliviong':'agemarkseniorliving',
  'trilogyhealthservcies':'trilogyhealthservices',
  'meridianseniorliving':'meridianseniorliving'
};
function canon(name){
  let k=(name||'').toLowerCase().replace(/[^a-z0-9]/g,'').replace(/[0-9]+$/,'');
  return ALIAS[k]||k;
}
let _ENT=null, _ENTBY=null;
function entities(){
  if(_ENT)return _ENT;
  const map={};
  DATA.providers.forEach(p=>{const c=canon(p.provider);(map[c]||(map[c]=[])).push(p);});
  _ENT=Object.entries(map).map(([cid,recs])=>{
    recs.sort((a,b)=>a.year-b.year);
    const last=recs[recs.length-1], first=recs[0];
    return {cid,name:last.provider,recs,years:recs.map(r=>r.year),first,last,
            byYear:Object.fromEntries(recs.map(r=>[r.year,r]))};
  });
  _ENTBY={}; _ENT.forEach(e=>_ENTBY[e.cid]=e);
  return _ENT;
}
function entityByName(name){entities();return _ENTBY[canon(name)];}
function entityStats(e){
  const a=e.first,b=e.last,span=b.year-a.year;
  const u0=a.units,u1=b.units;
  const multi=b.year>a.year;
  const abs=(multi&&u0!=null&&u1!=null)?u1-u0:null;
  const pctc=(multi&&u0&&u1!=null)?(u1-u0)/u0:null;
  const cagr=(multi&&u0>0&&u1>0&&span>0)?Math.pow(u1/u0,1/span)-1:null;
  const rankChg=(multi&&a.rank&&b.rank)?a.rank-b.rank:null;      // +ve = moved up the list
  const commChg=(multi&&a.communities!=null&&b.communities!=null)?b.communities-a.communities:null;
  const shareShift=k=>{
    const s0=segShare(a,k),s1=segShare(b,k);
    return (s0!=null&&s1!=null)?s1-s0:null;
  };
  return {span,u0,u1,abs,pctc,cagr,rankChg,commChg,y0:a.year,y1:b.year,
          alShift:shareShift('al'),ilShift:shareShift('il'),mcShift:shareShift('mc'),
          nyears:e.recs.filter(r=>r.units).length};
}
function segShare(r,k){const t=(r.al||0)+(r.il||0)+(r.mc||0);return t?((r[k]||0)/t):null;}
/* growth between two specific years, name-matched, with a minimum base filter */
function growthBetween(yA,yB,minBase){
  return entities().map(e=>{
    const a=e.byYear[yA],b=e.byYear[yB];
    if(!a||!b||a.units==null||b.units==null||!a.units)return null;
    return {name:b.provider,from:a.units,to:b.units,abs:b.units-a.units,pct:(b.units-a.units)/a.units,yA,yB};
  }).filter(x=>x&&x.from>=(minBase||0));
}

/* ----------------------------------------------------------- SVG charts (no libs) */
function svgLine(series, opts={}){
  // series: [{name,color,pts:[[x,y],...]}]  x=year
  const W=opts.w||640,H=opts.h||300,P={t:14,r:18,b:30,l:opts.l||52};
  const xs=opts.xs||YEARS;
  const allY=series.flatMap(s=>s.pts.map(p=>p[1])).filter(v=>v!=null);
  let ymin=opts.ymin!=null?opts.ymin:Math.min(...allY);
  let ymax=opts.ymax!=null?opts.ymax:Math.max(...allY);
  if(opts.zero) ymin=0;
  const pad=(ymax-ymin)*0.08||1; ymax+=pad; if(!opts.zero)ymin-=pad;
  const xmin=xs[0],xmax=xs[xs.length-1];
  const X=v=>P.l+(xmax===xmin?0:(v-xmin)/(xmax-xmin))*(W-P.l-P.r);
  const Y=v=>P.t+(1-(v-ymin)/(ymax-ymin))*(H-P.t-P.b);
  let g='';
  // gridlines + y labels
  const ticks=opts.ticks||4;
  for(let i=0;i<=ticks;i++){const yv=ymin+(ymax-ymin)*i/ticks;const yy=Y(yv);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${yy}" y2="${yy}" stroke="${C.line}" stroke-width="1" opacity=".5"/>`;
    g+=`<text x="${P.l-8}" y="${yy+4}" fill="${C.muted}" font-size="10.5" text-anchor="end">${opts.fy?opts.fy(yv):fmt(yv)}</text>`;}
  // x labels
  xs.forEach(xv=>{g+=`<text x="${X(xv)}" y="${H-10}" fill="${C.muted}" font-size="10.5" text-anchor="middle">${xv}</text>`;});
  // covid band optional
  series.forEach(s=>{
    const pts=s.pts.filter(p=>p[1]!=null);
    if(s.area){
      let d=`M ${X(pts[0][0])} ${Y(ymin)} `+pts.map(p=>`L ${X(p[0])} ${Y(p[1])}`).join(' ')+` L ${X(pts[pts.length-1][0])} ${Y(ymin)} Z`;
      g+=`<path d="${d}" fill="${s.color}" opacity=".12"/>`;
    }
    const d='M '+pts.map(p=>`${X(p[0])} ${Y(p[1])}`).join(' L ');
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    pts.forEach(p=>{g+=`<circle cx="${X(p[0])}" cy="${Y(p[1])}" r="3" fill="${s.color}"><title>${s.name} ${p[0]}: ${opts.fp?opts.fp(p[1]):fmt(p[1])}</title></circle>`;});
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}

function svgHBars(items, opts={}){
  // items:[{label,value,color,sub}]
  const n=items.length, rh=opts.rh||26, gap=8, W=opts.w||640, lw=opts.lw||150;
  const H=n*(rh+gap)+6; const max=opts.max||Math.max(...items.map(i=>i.value||0))||1;
  const bw=W-lw-70;
  let g='';
  items.forEach((it,idx)=>{
    const y=idx*(rh+gap)+4; const w=Math.max(0,(it.value||0)/max*bw);
    g+=`<text x="0" y="${y+rh*0.68}" fill="${C.txt}" font-size="12">${esc(it.label).slice(0,opts.clip||26)}</text>`;
    g+=`<rect x="${lw}" y="${y}" width="${bw}" height="${rh}" fill="#22344b" rx="5"/>`;
    g+=`<rect x="${lw}" y="${y}" width="${w}" height="${rh}" fill="${it.color||C.gold}" rx="5"/>`;
    g+=`<text x="${lw+bw+6}" y="${y+rh*0.68}" fill="${C.muted}" font-size="11.5">${opts.fv?opts.fv(it.value):fmt(it.value)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}

function svgGroupBars(groups, seriesDefs, opts={}){
  // groups:[{label, vals:{key:value}}] ; seriesDefs:[{key,name,color}]
  const W=opts.w||640,H=opts.h||300,P={t:14,r:14,b:28,l:46};
  const ng=groups.length, ns=seriesDefs.length;
  const gw=(W-P.l-P.r)/ng, bw=gw*0.7/ns;
  const max=opts.max||Math.max(...groups.flatMap(g=>seriesDefs.map(s=>g.vals[s.key]||0)))||1;
  const Y=v=>P.t+(1-v/max)*(H-P.t-P.b);
  let g='';
  for(let i=0;i<=4;i++){const yv=max*i/4,yy=Y(yv);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${yy}" y2="${yy}" stroke="${C.line}" opacity=".5"/>`;
    g+=`<text x="${P.l-7}" y="${yy+4}" fill="${C.muted}" font-size="10" text-anchor="end">${opts.fy?opts.fy(yv):fmt(yv)}</text>`;}
  groups.forEach((grp,gi)=>{
    const gx=P.l+gi*gw+gw*0.15;
    seriesDefs.forEach((s,si)=>{
      const v=grp.vals[s.key]||0; const x=gx+si*bw; const yy=Y(v);
      g+=`<rect x="${x}" y="${yy}" width="${bw-2}" height="${H-P.b-yy}" fill="${s.color}" rx="2"><title>${s.name} ${grp.label}: ${opts.fp?opts.fp(v):fmt(v)}</title></rect>`;
    });
    g+=`<text x="${P.l+gi*gw+gw/2}" y="${H-9}" fill="${C.muted}" font-size="10.5" text-anchor="middle">${grp.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}

function svgDonut(parts, opts={}){
  // parts:[{label,value,color}]
  const sz=opts.sz||190, r=sz/2-6, cx=sz/2, cy=sz/2, inner=opts.inner||r*0.6;
  const total=parts.reduce((a,p)=>a+p.value,0)||1;
  let a=-Math.PI/2, g='';
  parts.forEach(p=>{
    const frac=p.value/total, a2=a+frac*2*Math.PI;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+inner*Math.cos(a),yi1=cy+inner*Math.sin(a),xi2=cx+inner*Math.cos(a2),yi2=cy+inner*Math.sin(a2);
    const large=frac>0.5?1:0;
    g+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${inner} ${inner} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${p.color}"><title>${p.label}: ${pct(p.value/total)}</title></path>`;
    a=a2;
  });
  if(opts.center) g+=`<text x="${cx}" y="${cy-2}" fill="${C.txt}" font-size="15" font-weight="700" text-anchor="middle">${opts.center}</text><text x="${cx}" y="${cy+15}" fill="${C.muted}" font-size="10" text-anchor="middle">${opts.centerSub||''}</text>`;
  return `<svg viewBox="0 0 ${sz} ${sz}" style="max-width:${sz}px;margin:auto">${g}</svg>`;
}

function svgDivBars(items,opts={}){
  // diverging horizontal bars: positive grows right (green), negative grows left (red), sorted as given
  const n=items.length, rh=opts.rh||18, gap=7, W=opts.w||600, lw=opts.lw||48, pr=58;
  const H=n*(rh+gap)+4; const x0=lw, x1=W-pr, mid=(x0+x1)/2, half=(x1-x0)/2;
  const maxAbs=opts.max||Math.max(...items.map(i=>Math.abs(i.value||0)))||1;
  let g=`<line x1="${mid}" x2="${mid}" y1="0" y2="${H-4}" stroke="${C.muted}" stroke-dasharray="3 3" opacity=".55"/>`;
  items.forEach((it,idx)=>{
    const y=idx*(rh+gap)+2, v=it.value||0, w=Math.max(1,Math.abs(v)/maxAbs*half), x=v>=0?mid:mid-w, col=it.color||(v>=0?C.green:C.red);
    g+=`<text x="${x0-6}" y="${(y+rh*0.72).toFixed(1)}" text-anchor="end" fill="${C.txt}" font-size="11">${esc(it.label)}</text>`;
    g+=`<rect x="${x.toFixed(1)}" y="${y}" width="${w.toFixed(1)}" height="${rh}" fill="${col}" rx="2"/>`;
    g+=`<text x="${(v>=0?mid+w+5:mid-w-5).toFixed(1)}" y="${(y+rh*0.72).toFixed(1)}" text-anchor="${v>=0?'start':'end'}" fill="${col}" font-size="10.5" font-weight="600">${(v>=0?'+':'')+fmt(v)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%">${g}</svg>`;
}
function svgScatter(pts,opts={}){
  const W=opts.w||620,H=opts.h||300,P={t:14,r:16,b:34,l:48};
  const xmin=opts.xmin!=null?opts.xmin:0, xmax=opts.xmax!=null?opts.xmax:1;
  const ys=pts.map(p=>p.y);
  let ymin=opts.ymin!=null?opts.ymin:Math.min(0,...ys), ymax=opts.ymax!=null?opts.ymax:Math.max(...ys);
  const pad=(ymax-ymin)*0.08||0.1; ymax+=pad; ymin-=pad;
  const X=v=>P.l+(v-xmin)/(xmax-xmin||1)*(W-P.l-P.r);
  const Y=v=>P.t+(1-(v-ymin)/(ymax-ymin||1))*(H-P.t-P.b);
  let g='';
  for(let i=0;i<=4;i++){const yv=ymin+(ymax-ymin)*i/4,yy=Y(yv);g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${yy}" y2="${yy}" stroke="${C.line}" opacity=".5"/><text x="${P.l-7}" y="${yy+4}" fill="${C.muted}" font-size="10" text-anchor="end">${opts.fy?opts.fy(yv):fmt(yv)}</text>`;}
  for(let i=0;i<=4;i++){const xv=xmin+(xmax-xmin)*i/4,xx=X(xv);g+=`<text x="${xx}" y="${H-10}" fill="${C.muted}" font-size="10" text-anchor="middle">${opts.fx?opts.fx(xv):xv}</text>`;}
  if(ymin<0&&ymax>0){const z=Y(0);g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${z}" y2="${z}" stroke="${C.muted}" stroke-dasharray="3 3" opacity=".7"/>`;}
  pts.forEach(p=>{g+=`<circle cx="${X(p.x)}" cy="${Y(Math.max(ymin,Math.min(ymax,p.y)))}" r="${p.r||4}" fill="${p.c||C.blue}" opacity=".7" stroke="#0a2949" stroke-width=".5"><title>${esc(p.label)}: ${(p.x*100).toFixed(0)}% manage, ${(p.y*100).toFixed(0)}% growth</title></circle>`;});
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}

function kpi(label,value,sub,cls,onClick){

/* reusable operator-takeaway callout — decision-oriented, gold-accented */
function takeaway(bullets){
  const lis=(Array.isArray(bullets)?bullets:[bullets]).map(b=>`<li>${b}</li>`).join('');
  return el(`<div class="takeaway"><div class="th">▸ Operator takeaway</div><ul>${lis}</ul></div>`);
}
/* hover tile — context + optional sparkline, no click-through (consistent w/ Workforce tool) */
function kpiCard(label,value,sub,cls,o){
  o=o||{};
  let pop='';
  if(o.tip||o.spark){
    const sp=(o.spark&&o.spark.filter(p=>p[1]!=null).length>1)?`<div style="margin-top:8px">${svgSpark(o.spark.filter(p=>p[1]!=null),o.sparkColor||C.gold,o.sparkFmt)}</div>`:'';
    pop=`<div class="kpi-pop">${o.tip?`<div class="pop-tip">${o.tip}</div>`:''}${sp}</div>`;
  }
  return el(`<div class="card kpi accent hoverable"><div class="label">${label}</div><div class="value ${cls||'v-txt'}">${value}</div><div class="sub">${sub||''}</div>${pop}</div>`);
}
function svgSpark(pts,color,fy){
  const W=240,H=72,P={t:9,r:40,b:16,l:8};
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs);let y0=Math.min(...ys),y1=Math.max(...ys);
  if(y0===y1){y0-=1;y1+=1;}
  const X=v=>P.l+(v-x0)/((x1-x0)||1)*(W-P.l-P.r);
  const Y=v=>P.t+(1-(v-y0)/((y1-y0)||1))*(H-P.t-P.b);
  const d=pts.map((p,i)=>(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)).join(' ');
  const last=pts[pts.length-1], fmtv=fy||fmt;
  let g=`<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>`;
  g+=`<circle cx="${X(last[0]).toFixed(1)}" cy="${Y(last[1]).toFixed(1)}" r="3" fill="${color}"/>`;
  g+=`<text x="${X(x0).toFixed(1)}" y="${H-4}" fill="${C.muted}" font-size="9">${x0}</text>`;
  g+=`<text x="${X(x1).toFixed(1)}" y="${H-4}" fill="${C.muted}" font-size="9" text-anchor="end">${x1}</text>`;
  g+=`<text x="${(X(last[0])+5).toFixed(1)}" y="${(Y(last[1])+3).toFixed(1)}" fill="${color}" font-size="10.5" font-weight="700">${fmtv(last[1])}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-height:78px">${g}</svg>`;
}
function deltaSpan(cur,prev,asPct){
  if(cur==null||prev==null) return '';
  const d=cur-prev; const cl=d>0?'delta-pos':(d<0?'delta-neg':'delta-flat');
  const arrow=d>0?'▲':(d<0?'▼':'■');
  const txt=asPct?pp(d):(d>0?'+':'')+fmt(d);
  return `<span class="${cl}">${arrow} ${txt}</span>`;
}

  const sl=el(`<input type="range" min="${YMIN}" max="${YMAX-1}" value="${ovFrom}" step="1" style="flex:1;max-width:240px">`);
  sl.oninput=e=>{ovFrom=+e.target.value;$('#ovFromLab').textContent=ovFrom+'–'+YMAX;ovUnitsDraw();};
  ctl.append(el('<span class="mini">Show from</span>'),sl,el(`<span class="mini" id="ovFromLab">${ovFrom}–${YMAX}</span>`));
  ovUnitsDraw();
}
function ovUnitsDraw(){
  const w=$('#ovUnitsWrap'); if(!w)return;
  const tr=DATA.trends.filter(t=>t.year>=ovFrom);
  const series=[{name:'Total units',color:C.gold,pts:tr.map(t=>[t.year,t.total_units]),area:true}];
  w.innerHTML=svgLine(series,{xs:tr.map(t=>t.year),zero:false,fy:v=>(v/1000).toFixed(0)+'k',fp:fmt});
}
function segMixInit(){
  if(!segYears)segYears=DATA.trends.map(t=>t.year);
  const ctl=$('#segMixCtl'); if(!ctl)return; ctl.innerHTML='';
  const seg=el(`<select id="segPick"><option value="all">All segments</option><option value="al">Assisted Living</option><option value="il">Independent Living</option><option value="mc">Memory Care</option></select>`);
  seg.value=segPick; seg.onchange=e=>{segPick=e.target.value;segMixDraw();};
  ctl.append(el('<span class="mini">Segment</span>'),seg,el('<div class="ctl-break"></div>'),el('<span class="mini">Years</span>'));
  DATA.trends.forEach(t=>{
    const on=segYears.includes(t.year);
    const b=el(`<button class="yrchip${on?' on':''}">${t.year}</button>`);
    b.onclick=()=>{if(on){if(segYears.length>1)segYears=segYears.filter(y=>y!==t.year);}else{segYears.push(t.year);}segYears.sort();segMixInit();};
    ctl.appendChild(b);
  });
  segMixDraw();
}
function segMixDraw(){
  const wrap=$('#segMixWrap'); if(!wrap)return;
  const yrs=DATA.trends.filter(t=>segYears.includes(t.year)).sort((a,b)=>a.year-b.year);
  if(segPick==='all'){
    const groups=yrs.map(t=>({label:''+t.year,vals:{al:t.al,il:t.il,mc:t.mc}}));
    const sd=[{key:'al',name:'Assisted Living',color:C.blue},{key:'il',name:'Independent Living',color:C.teal},{key:'mc',name:'Memory Care',color:C.violet}];
    wrap.innerHTML=svgGroupBars(groups,sd,{fy:v=>(v/1000).toFixed(0)+'k',fp:fmt});
  } else {
    const col={al:C.blue,il:C.teal,mc:C.violet}[segPick], name={al:'Assisted Living',il:'Independent Living',mc:'Memory Care'}[segPick];
    const items=yrs.map(t=>({label:''+t.year,value:t[segPick],color:col}));
    wrap.innerHTML=svgHBars(items,{w:560,rh:24,lw:56,clip:30,fv:fmt})+`<p class="mini" style="margin-top:6px"><b style="color:${col}">${name}</b> share of categorized units: ${yrs.map(t=>`${t.year} ${pct(t[segPick+'_share'],0)}`).join(' &middot; ')}</p>`;
  }
}

/* ---- Provider Directory ---- */
let provYear=YMAX, provSort={key:'rank',dir:1}, provQuery='', provMode='year';
let provMSort={key:'last',dir:-1};
RENDER.providers=()=>{
  const root=$('#tab-providers');
  root.appendChild(el(`<h2 class="section">Provider directory</h2>`));
  root.appendChild(el(`<p class="lede">Every provider on the Largest Providers list. <strong>By year</strong> shows a single year's roster; <strong>Multi-year</strong> tracks each company across ${YMIN}–${YMAX} with growth analysis; <strong>Compare</strong> puts up to six companies side by side. Click any row for a full profile — geography, capital structure, growth plans, and the company's full multi-year trajectory.</p>`));
  const ctr=el('<div class="controls"></div>');

  tog.querySelectorAll('button').forEach(b=>b.onclick=()=>{provMode=b.dataset.m;RENDER_resetProv();});
  ctr.appendChild(tog);
  if(provMode==='compare'){

    sel.onchange=e=>{const c=e.target.value;if(c&&!compareSel.includes(c)&&compareSel.length<6)compareSel.push(c);sel.value='';drawCompare();};
    c2.append(el('<span class="mini">Add company (2–6)</span>'),sel,el('<span id="cmpChips" style="display:flex;flex-wrap:wrap;gap:7px"></span>'));
    root.appendChild(c2);
    const c3=el('<div class="controls"></div>');
    const csl=el(`<input type="range" min="${YMIN}" max="${YMAX-1}" value="${cmpFrom}" step="1" style="flex:1;max-width:240px">`);
    csl.oninput=e=>{cmpFrom=+e.target.value;$('#cmpFromLab').textContent=cmpFrom+'–'+YMAX;drawCompare();};
    c3.append(el('<span class="mini">Chart years from</span>'),csl,el(`<span class="mini" id="cmpFromLab">${cmpFrom}–${YMAX}</span>`));
    root.appendChild(c3);
    root.appendChild(el('<div id="provBody"></div>'));

  const ysel=el(`<select id="provYear">${YEARS.slice().reverse().map(y=>`<option ${y===provYear?'selected':''}>${y}</option>`).join('')}</select>`);
  ysel.onchange=e=>{provYear=+e.target.value;drawProv();};
  if(provMode==='year'){ctr.append(el('<span class="mini">Report year</span>'),ysel);}
  const search=el(`<input type="text" id="provSearch" placeholder="Search provider, city, state or CEO…" value="${esc(provQuery)}">`);
  search.oninput=e=>{provQuery=e.target.value.toLowerCase();provMode==='year'?drawProv():drawProvMulti();};
  ctr.append(search,el('<span class="legend-note" id="provCount"></span>'));
  const csv=el('<button class="csv-btn">Export CSV ⭳</button>');
  csv.onclick=()=>provMode==='year'?exportProv():exportProvMulti();
  ctr.appendChild(csv);
  root.appendChild(ctr);
  root.appendChild(el('<div class="tablecard"><div class="inner"><table id="provTable"></table></div></div>'));
  provMode==='year'?drawProv():drawProvMulti();
  root.appendChild(takeaway([`Benchmark against <b>named peers</b>, not just the field average — <b>Compare</b> lines up 2–6 companies on units, communities, employees and growth, and every row opens a full multi-year profile.`]));
};
function RENDER_resetProv(){$('#tab-providers').innerHTML='';RENDER.providers();}
let compareSel=[], cmpFrom=YMIN;
function drawCompare(){
  const PAL=[C.gold,C.blue,C.teal,C.violet,C.green,C.orange];
  entities();
  const sels=compareSel.map(cid=>_ENTBY[cid]).filter(Boolean);
  const chipBox=$('#cmpChips');
  if(chipBox){chipBox.innerHTML='';
    sels.forEach((e,i)=>{const ch=el(`<span class="cmp-chip" style="background:${PAL[i%PAL.length]}">${esc(e.name)} <button title="Remove">×</button></span>`);ch.querySelector('button').onclick=()=>{compareSel=compareSel.filter(c=>c!==e.cid);drawCompare();};chipBox.appendChild(ch);});
  }
  const body=$('#provBody'); if(!body)return; body.innerHTML='';
  if(sels.length<2){body.appendChild(el('<div class="card"><p class="mini">Add at least two companies above to compare.</p></div>'));return;}
  const legend=sels.map((e,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;margin:0 12px 4px 0"><span class="sw" style="background:${PAL[i%PAL.length]}"></span>${esc(e.name)}</span>`).join('');
  const cmpXs=YEARS.filter(y=>y>=cmpFrom);
  const lineFor=metric=>sels.map((e,i)=>({name:e.name,color:PAL[i%PAL.length],pts:e.recs.filter(r=>r[metric]!=null&&r.year>=cmpFrom).map(r=>[r.year,r[metric]])}));
  const chartCard=(title,metric,fy)=>`<div class="card chart-card"><h3 style="font-size:14px">${title}</h3><div class="legend" style="margin:2px 0 4px;flex-wrap:wrap">${legend}</div><div class="chart-wrap">${svgLine(lineFor(metric),{xs:cmpXs,zero:false,fy,fp:fmt})}</div></div>`;
  const row=el('<div class="grid two-col"></div>');
  row.appendChild(el(chartCard('Units','units',v=>(v/1000).toFixed(0)+'k')));
  row.appendChild(el(chartCard('Communities','communities',fmt)));
  body.appendChild(row);
  const row2=el('<div class="grid two-col"></div>');
  row2.appendChild(el(chartCard('Employees','employees',v=>(v/1000).toFixed(0)+'k')));
  const segGroups=sels.map(e=>({label:e.name.length>15?e.name.slice(0,14)+'…':e.name,vals:{al:e.last.al||0,il:e.last.il||0,mc:e.last.mc||0}}));
  const segSeries=[{key:'al',name:'Assisted Living',color:C.green},{key:'il',name:'Independent Living',color:C.blue},{key:'mc',name:'Memory Care',color:C.violet}];
  const segLeg=segSeries.map(s=>`<span style="display:inline-flex;align-items:center;gap:5px;margin:0 12px 4px 0"><span class="sw" style="background:${s.color}"></span>${s.name}</span>`).join('');
  row2.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Latest segment mix (${YMAX})</h3><div class="legend" style="margin:2px 0 4px;flex-wrap:wrap">${segLeg}</div><div class="chart-wrap">${svgGroupBars(segGroups,segSeries,{fy:fmt,fp:fmt})}</div></div>`));
  body.appendChild(row2);
  // comparison table
  const cols=[['Company',e=>`<a href="#" onclick="openProvider('${esc(e.name).replace(/'/g,"\\'")}',${YMAX});return false">${esc(e.name)}</a>`,'left'],
    ['Years',e=>e._st.nyears],
    [`Units ${YMAX}`,e=>fmt(e.last.units)],
    ['Δ units (span)',e=>e._st.abs==null?'—':growthSpan(e._st.abs)],
    ['Δ % (span)',e=>e._st.pctc==null?'—':growthSpan(e._st.pctc,true)],
    ['CAGR/yr',e=>e._st.cagr==null?'—':pct(e._st.cagr)],
    [`Communities ${YMAX}`,e=>fmt(e.last.communities)],
    [`Employees ${YMAX}`,e=>fmt(e.last.employees)],
    ['Best rank',e=>e._bestRank?'#'+e._bestRank:'—'],
    [`AL / IL / MC ${YMAX}`,e=>`${fmt(e.last.al||0)} / ${fmt(e.last.il||0)} / ${fmt(e.last.mc||0)}`],
    ['HQ',e=>esc(e.last.loc||'—')]];
  sels.forEach(e=>{e._st=e._st||entityStats(e);e._bestRank=e._bestRank||Math.min(...e.recs.filter(r=>r.rank).map(r=>r.rank),999);if(e._bestRank===999)e._bestRank=null;});
  let th='<thead><tr>'+cols.map((c,i)=>`<th style="text-align:${i===0?'left':'right'}">${c[0]}</th>`).join('')+'</tr></thead>';
  let tb='<tbody>'+sels.map(e=>'<tr>'+cols.map((c,i)=>`<td style="text-align:${i===0?'left':'right'}">${c[1](e)}</td>`).join('')+'</tr>').join('')+'</tbody>';
  body.appendChild(el(`<div class="tablecard" style="margin-top:16px"><div class="inner"><table>${th}${tb}</table></div></div>`));
  body.appendChild(el('<p class="mini" style="margin-top:8px">Multi-year figures are name-matched across each company\'s years on the list — directional. Δ span = first to last reported year.</p>'));
}
const PROV_COLS=[
  ['rank','Rank',v=>v==null?'—':v],['provider','Provider',v=>esc(v)],
  ['units','Units',fmt],['al','AL',fmt],['il','IL',fmt],['mc','MC',fmt],
  ['communities','Communities',fmt],['employees','Employees',fmt],
  ['fpnfp','FP / NFP',v=>v?`<span class="pill ${v==='FP'?'blue':'grey'}">${esc(v)}</span>`:'—'],
  ['loc','Headquarters',v=>esc(v||'—')]
];
function provRows(){
  let rows=DATA.providers.filter(p=>p.year===provYear);
  if(provQuery){rows=rows.filter(p=>[p.provider,p.loc,p.ceo].some(x=>(x||'').toLowerCase().includes(provQuery)));}
  const k=provSort.key,d=provSort.dir;
  rows.sort((a,b)=>{let x=a[k],y=b[k];
    if(x==null)return 1; if(y==null)return -1;
    if(typeof x==='string')return d*x.localeCompare(y);
    return d*(x-y);});
  return rows;
}
function drawProv(){
  const rows=provRows();
  const t=$('#provTable');
  let h='<thead><tr>'+PROV_COLS.map(c=>{
    const ar=provSort.key===c[0]?`<span class="arr">${provSort.dir>0?'▲':'▼'}</span>`:'';
    return `<th data-k="${c[0]}" class="${c[0]==='provider'?'name':''}">${c[1]} ${ar}</th>`;}).join('')+'</tr></thead><tbody>';
  rows.forEach((p,i)=>{
    h+=`<tr class="row-click" data-i="${i}">`+PROV_COLS.map(c=>{
      const cls=c[0]==='provider'?'name':'';
      return `<td class="${cls}">${c[2](p[c[0]])}</td>`;}).join('')+'</tr>';
  });
  h+='</tbody>';
  t.innerHTML=h;
  t.querySelectorAll('th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(provSort.key===k)provSort.dir*=-1;else{provSort={key:k,dir:k==='rank'||k==='provider'?1:-1};}
    drawProv();});
  t.querySelectorAll('tr.row-click').forEach(tr=>tr.onclick=()=>openProvider(rows[+tr.dataset.i].provider,provYear));
  $('#provCount').textContent=`${rows.length} providers · ${provYear}`;
}
function exportProv(){
  const rows=provRows();
  const head=['report_year','rank','provider','total_units','al_units','il_units','mc_units','communities','employees','fp_nfp','headquarters','chief_executive','title','website'];
  const lines=[head.join(',')];
  rows.forEach(p=>lines.push([p.year,p.rank,p.provider,p.units,p.al,p.il,p.mc,p.communities,p.employees,p.fpnfp,p.loc,p.ceo,p.title,p.website].map(csvCell).join(',')));
  download(lines.join('\n'),`largest_providers_${provYear}.csv`);
}
const csvCell=v=>{if(v==null)return '';v=String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
function download(text,name){const b=new Blob(['﻿'+text],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();}
function growthSpan(v,asPct){if(v==null)return '—';const cl=v>0?'v-green':(v<0?'v-red':'v-grey');const txt=asPct?((v>0?'+':'')+(v*100).toFixed(0)+'%'):((v>0?'+':'')+fmt(v));return `<span class="${cl}">${txt}</span>`;}

/* ---- Provider directory: multi-year (by company) ---- */
const MCOLS=[
  ['name','Company',e=>esc(e.name)],
  ['nyears','Yrs',e=>e._st.nyears],
  ['first','First units',e=>e._st.u0==null?'—':fmt(e._st.u0)+` <span class="mini">(${e._st.y0})</span>`],
  ['last','Latest units',e=>e._st.u1==null?'—':fmt(e._st.u1)+` <span class="mini">(${e._st.y1})</span>`],
  ['abs','Δ Units',e=>growthSpan(e._st.abs)],
  ['pct','Δ %',e=>growthSpan(e._st.pctc,true)],
  ['cagr','CAGR',e=>e._st.cagr==null?'—':`<span class="${e._st.cagr>0?'v-green':(e._st.cagr<0?'v-red':'v-grey')}">${pct(e._st.cagr)}</span>`],
  ['rank','Best rank',e=>e._bestRank<999?'#'+e._bestRank:'—']
];
function provMultiRows(){
  let es=entities().map(e=>{e._st=entityStats(e);const rk=e.recs.filter(r=>r.rank).map(r=>r.rank);e._bestRank=rk.length?Math.min(...rk):999;return e;});
  if(provQuery)es=es.filter(e=>e.recs.some(r=>(r.provider||'').toLowerCase().includes(provQuery)));
  const k=provMSort.key,d=provMSort.dir;
  const val=e=>({name:e.name,nyears:e._st.nyears,first:e._st.u0,last:e._st.u1,abs:e._st.abs,pct:e._st.pctc,cagr:e._st.cagr,rank:e._bestRank}[k]);
  es.sort((a,b)=>{let x=val(a),y=val(b);if(x==null)return 1;if(y==null)return -1;if(typeof x==='string')return d*x.localeCompare(y);return d*(x-y);});
  return es;
}
function drawProvMulti(){
  const rows=provMultiRows(); const t=$('#provTable');
  let h='<thead><tr>'+MCOLS.map(c=>{const ar=provMSort.key===c[0]?`<span class="arr">${provMSort.dir>0?'▲':'▼'}</span>`:'';return `<th data-k="${c[0]}" class="${c[0]==='name'?'name':''}">${c[1]} ${ar}</th>`;}).join('')+'</tr></thead><tbody>';
  rows.forEach((e,i)=>{h+=`<tr class="row-click" data-i="${i}">`+MCOLS.map(c=>`<td class="${c[0]==='name'?'name':''}">${c[2](e)}</td>`).join('')+'</tr>';});
  h+='</tbody>'; t.innerHTML=h;
  t.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(provMSort.key===k)provMSort.dir*=-1;else provMSort={key:k,dir:k==='name'?1:-1};drawProvMulti();});
  t.querySelectorAll('tr.row-click').forEach(tr=>tr.onclick=()=>{const e=rows[+tr.dataset.i];openProvider(e.last.provider,e.last.year);});
  $('#provCount').textContent=`${rows.length} companies · name-matched across ${YMIN}–${YMAX}`;
}
function exportProvMulti(){
  const rows=provMultiRows();
  const head=['company','years_on_list','first_year','first_units','latest_year','latest_units','units_change','pct_change','cagr','best_rank','years_present'];
  const lines=[head.join(',')];
  rows.forEach(e=>{const s=e._st;lines.push([e.name,s.nyears,s.y0,s.u0,s.y1,s.u1,s.abs,s.pctc==null?'':(s.pctc*100).toFixed(1)+'%',s.cagr==null?'':(s.cagr*100).toFixed(1)+'%',e._bestRank<999?e._bestRank:'',e.years.join(' ')].map(csvCell).join(','));});
  download(lines.join('\n'),`largest_providers_multiyear.csv`);
}

/* ---- provider profile modal ---- */
function openProvider(name,year){
  const key=norm(name);
  const rec=DATA.providers.find(p=>p.year===year&&norm(p.provider)===key)||DATA.providers.find(p=>norm(p.provider)===key&&p.year===year);
  const r=rec||DATA.providers.find(p=>norm(p.provider)===key);
  if(!r)return;
  $('#mTitle').textContent=r.provider;
  $('#mSub').innerHTML=`${r.loc?esc(r.loc)+' &middot; ':''}${r.fpnfp?esc(r.fpnfp)+' &middot; ':''}Report year ${year}${r.rank?` &middot; Rank #${r.rank}`:''}`;
  const b=$('#mBody'); b.innerHTML='';
  // stats
  const mg=el('<div class="mgrid"></div>');
  const stat=(l,v,cls)=>mg.appendChild(el(`<div class="mstat"><div class="l">${l}</div><div class="vv ${cls||''}">${v}</div></div>`));
  stat('Total units',fmt(r.units),'v-gold');
  stat('Assisted living',fmt(r.al),'v-blue');
  stat('Independent living',fmt(r.il),'v-blue');
  stat('Memory care',fmt(r.mc),'v-violet');
  stat('U.S. communities',fmt(r.communities));
  stat('Employees',fmt(r.employees));
  const _di=diversIndex(r); if(_di!=null)stat('Diversification',Math.round(_di)+' / 100','v-blue');
  b.appendChild(mg);
  if(r.ceo) b.appendChild(el(`<p class="mini" style="margin:10px 0 0">Chief executive: <strong style="color:var(--txt)">${esc(r.ceo)}</strong>${r.title?', '+esc(r.title):''}${r.website?` &middot; <a href="https://${esc(r.website.replace(/^https?:\/\//,''))}" target="_blank" rel="noopener">${esc(r.website)} ↗</a>`:''}</p>`));

  // geography
  const geo=DATA.geo_detail.filter(g=>norm(g.provider)===key&&g.year===year).sort((a,b)=>(b.c||0)-(a.c||0));
  if(geo.length){
    const sec=el('<div class="msec"><h4>Where they operate ('+year+')</h4></div>');
    sec.appendChild(el(`<p class="mini">${geo.length} states reported &middot; ${fmt(geo.reduce((a,g)=>a+(g.c||0),0))} communities</p>`));
    sec.appendChild(el(svgHBars(geo.slice(0,12).map(g=>({label:g.st,value:g.c||0,color:C.teal})),{w:560,rh:18,lw:40,clip:6,fv:fmt})));
    b.appendChild(sec);
  }
  // ownership
  const ow=DATA.ownership_detail.find(o=>norm(o.provider)===key);
  if(ow){
    const rows=[['Owned',ow.owned,C.green],['RIDEA / JV',ow.ridea,C.teal],['Lease',ow.lease,C.orange],['Manage',ow.manage,C.blue],['Private equity',ow.pe,C.violet]].filter(x=>x[1]!=null&&x[1]>=0&&x[1]<=1);
    if(rows.length){
      const sec=el('<div class="msec"><h4>Capital structure (2026)</h4></div>');
      rows.forEach(x=>sec.appendChild(el(`<div class="stat-row"><span>${x[0]}</span><div class="barline"><div class="fill" style="width:${(x[1]*100).toFixed(0)}%;background:${x[2]}"></div></div><span class="v">${pct(x[1],0)}</span></div>`)));
      b.appendChild(sec);
    }
  }
  // growth / sentiment
  const gr=DATA.growth.find(g=>norm(g.provider)===key);
  if(gr){
    const sec=el('<div class="msec"><h4>Growth & forward outlook (2026)</h4></div>');
    const chips=[];
    if(gr.occ)chips.push(`<span class="pill ${expColor(gr.occ)}">Occupancy: ${esc(gr.occ)}</span>`);
    if(gr.portfolio)chips.push(`<span class="pill ${expColor(gr.portfolio)}">Portfolio: ${esc(gr.portfolio)}</span>`);
    if(gr.plan_grow)chips.push(`<span class="pill ${gr.plan_grow.toLowerCase()==='yes'?'green':'grey'}">Plan to grow: ${esc(gr.plan_grow)}</span>`);
    if(chips.length)sec.appendChild(el(`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">${chips.join('')}</div>`));
    const fld=(lab,val)=>{if(val&&String(val).trim()&&!['n/a','none','no','0'].includes(String(val).trim().toLowerCase()))sec.appendChild(el(`<div class="gfield"><div class="lab">${lab}</div><div class="gtext">${esc(val)}</div></div>`));};
    fld('M&A / divestiture',gr.ma); fld('Development pipeline',gr.pipeline); fld('Restructuring / branding',gr.restructuring);
    if(gr.net_growth)sec.appendChild(el(`<p class="mini" style="margin-top:8px">Net community change 2024→25: ${esc(gr.net_growth)}</p>`));
    b.appendChild(sec);
  }
  // multi-year trajectory (name-matched across years)
  const ent=entityByName(name);
  if(ent&&ent.recs.length>1){
    const st=entityStats(ent), recs=ent.recs;
    const sec=el('<div class="msec"><h4>Multi-year trajectory — name-matched, directional</h4></div>');
    // analysis bullets
    const bl=[];
    if(st.abs!=null) bl.push(`<li>Units: <b>${fmt(st.u0)}</b> (${st.y0}) → <b>${fmt(st.u1)}</b> (${st.y1}) — ${growthSpan(st.abs)} (${growthSpan(st.pctc,true)})${st.cagr!=null?`, CAGR <b>${pct(st.cagr)}</b>/yr`:''}.</li>`);
    if(st.rankChg!=null&&ent.first.rank&&ent.last.rank) bl.push(`<li>List rank: <b>#${ent.first.rank}</b> (${st.y0}) → <b>#${ent.last.rank}</b> (${st.y1}) — ${st.rankChg>0?`<span class="v-green">up ${st.rankChg}</span>`:(st.rankChg<0?`<span class="v-red">down ${-st.rankChg}</span>`:'unchanged')}.</li>`);
    if(st.commChg!=null) bl.push(`<li>U.S. communities: ${growthSpan(st.commChg)} over the period.</li>`);
    const shifts=[['Memory care',st.mcShift],['Assisted living',st.alShift],['Independent living',st.ilShift]].filter(x=>x[1]!=null);
    if(shifts.length){const big=shifts.sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]))[0];if(Math.abs(big[1])>=0.01)bl.push(`<li>Mix shift: ${big[0]} share ${pp(big[1])} of categorized units, ${st.y0}→${st.y1}.</li>`);}
    bl.push(`<li>On the list <b>${st.nyears}</b> of ${YEARS.length} years (${ent.years.join(', ')}).</li>`);
    sec.appendChild(el(`<ul class="findings" style="margin:0 0 10px;font-size:12.5px">${bl.join('')}</ul>`));
    // toggleable trajectory chart (care segments / units / communities / employees)
    const hasSeg=recs.filter(r=>r.al!=null).length>=2;
    const tog=el(`<div class="seg-toggle" style="margin:2px 0 6px"><button data-m="seg" class="${hasSeg?'active':''}">Care segments</button><button data-m="units" class="${hasSeg?'':'active'}">Units</button><button data-m="communities">Communities</button><button data-m="employees">Employees</button></div>`);
    const chartBox=el('<div class="chart-wrap"></div>'), legendBox=el('<div></div>');
    const drawTraj=m=>{
      if(m==='seg'&&!hasSeg)m='units';
      if(m==='seg'){
        chartBox.innerHTML=svgLine([{name:'Total units',color:C.gold,pts:recs.map(r=>[r.year,r.units])},{name:'Assisted living',color:C.blue,pts:recs.map(r=>[r.year,r.al])},{name:'Independent living',color:C.teal,pts:recs.map(r=>[r.year,r.il])},{name:'Memory care',color:C.violet,pts:recs.map(r=>[r.year,r.mc])}],{w:680,h:220,zero:true,fy:v=>(v/1000).toFixed(0)+'k',fp:fmt,xs:YEARS});
        legendBox.innerHTML=`<div class="legend"><div><span class="sw" style="background:${C.gold}"></span>Total</div><div><span class="sw" style="background:${C.blue}"></span>AL</div><div><span class="sw" style="background:${C.teal}"></span>IL</div><div><span class="sw" style="background:${C.violet}"></span>MC</div></div>`;
      } else {
        const cfg={units:['Units',C.gold,v=>(v/1000).toFixed(0)+'k',true],communities:['Communities',C.teal,fmt,true],employees:['Employees',C.blue,v=>(v/1000).toFixed(0)+'k',false]}[m];
        const pts=recs.filter(r=>r[m]!=null).map(r=>[r.year,r[m]]);
        chartBox.innerHTML=pts.length?svgLine([{name:cfg[0],color:cfg[1],pts,area:true}],{w:680,h:220,zero:cfg[3],fy:cfg[2],fp:fmt,xs:YEARS}):'<p class="mini">No '+m+' reported across years.</p>';
        legendBox.innerHTML='';
      }
    };
    tog.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{tog.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===btn));drawTraj(btn.dataset.m);});
    sec.append(tog,chartBox,legendBox);
    drawTraj(hasSeg?'seg':'units');
    // year-by-year table
    let th=`<table style="margin-top:12px"><thead><tr><th class="no-sort">Year</th><th class="no-sort">Rank</th><th class="no-sort">Units</th><th class="no-sort">AL</th><th class="no-sort">IL</th><th class="no-sort">MC</th><th class="no-sort">Comm.</th><th class="no-sort">Emp.</th></tr></thead><tbody>`;
    recs.forEach(r=>{th+=`<tr><td>${r.year}</td><td>${r.rank?'#'+r.rank:'—'}</td><td>${fmt(r.units)}</td><td>${fmt(r.al)}</td><td>${fmt(r.il)}</td><td>${fmt(r.mc)}</td><td>${fmt(r.communities)}</td><td>${fmt(r.employees)}</td></tr>`;});
    th+='</tbody></table>';
    sec.appendChild(el(th));
    sec.appendChild(el(`<p class="mini" style="margin-top:8px">Matched across years by normalized name; not a formal entity link, so read as directional. Matched names: ${[...new Set(recs.map(r=>r.provider))].map(esc).join(' · ')}.</p>`));
    b.appendChild(sec);
  }
  $('#modal').classList.add('open');
}
function expColor(s){s=(s||'').toLowerCase();if(s.includes('substan')||s.includes('increase'))return 'green';if(s.includes('decrease'))return 'red';return 'grey';}
function closeModal(){$('#modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ---- Trends ---- */
let trFrom=YMIN, commMode='total', topMetric='units', msMode='migration', msMetric='units';
RENDER.trends=()=>{
  const root=$('#tab-trends');
  root.appendChild(el(`<h2 class="section">Aggregate trends, ${YMIN}–${YMAX}</h2>`));
  root.appendChild(el(`<p class="lede">Field-level scale, market concentration and care-segment mix over seven report years, set against the broader U.S. market. Level metrics are comparable ${YMIN}-forward; ratio metrics are panel-size-neutral. Year-to-year shifts partly reflect who responded — see About.</p>`));

  // ---- NIC market context ----
  nicSection(root);

  // ---- year-range slider (drives the time-series charts below) ----
  const ctl=el('<div class="controls"></div>');
  const sl=el(`<input type="range" min="${YMIN}" max="${YMAX-1}" value="${trFrom}" step="1" style="flex:1;max-width:240px">`);
  sl.oninput=e=>{trFrom=+e.target.value;$('#trFromLab').textContent=trFrom+'–'+YMAX;trRedraw();};
  ctl.append(el('<span class="mini">Show years from</span>'),sl,el(`<span class="mini" id="trFromLab">${trFrom}–${YMAX}</span>`));
  root.appendChild(ctl);

  // Scale + communities (with density toggle)
  const r1=el('<div class="grid two-col"></div>');
  r1.appendChild(el(`<div class="card chart-card"><h3>Sector scale — total units</h3><p class="note">Sum of reported units each year.</p><div class="chart-wrap" id="trUnits"></div></div>`));
  const cm=el(`<div class="card chart-card"><h3>U.S. communities & campus density</h3></div>`);
  const cmTog=el(`<div class="seg-toggle" style="margin:2px 0 6px"><button data-m="total" class="active">Total communities</button><button data-m="density">Avg units / community</button></div>`);
  cmTog.querySelectorAll('button').forEach(b=>b.onclick=()=>{commMode=b.dataset.m;cmTog.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));drawComm();});
  cm.appendChild(cmTog); cm.appendChild(el('<div class="chart-wrap" id="trComm"></div>'));
  r1.appendChild(cm);
  root.appendChild(r1);

  // Concentration index (HHI)
  root.appendChild(el(`<div class="card chart-card"><h3>Concentration index (<abbr title="${HHI_DEF}">HHI</abbr>)</h3><p class="note">Σ(unit share)² × 10,000. All years sit far below 1,500 — a highly fragmented field. Hover "HHI" for the definition.</p><div class="chart-wrap" id="trHHI"></div></div>`));

  // ---- Consolidated: Panel structure vs the U.S. market ----
  root.appendChild(el(`<h3 class="section" style="margin-top:20px;font-size:15px">Panel structure vs the U.S. market</h3>`));
  root.appendChild(el(`<p class="lede">Three lenses on how the top-150 panel is structured — within the panel (left) and as a slice of the whole NIC-measured U.S. market (right).</p>`));
  const msTog=el(`<div class="seg-toggle" style="margin-bottom:8px"><button data-m="migration" class="active">Where share is moving</button><button data-m="concentration">Concentration by measure</button><button data-m="caremix">Care-segment mix</button></div>`);
  msTog.querySelectorAll('button').forEach(b=>b.onclick=()=>{msMode=b.dataset.m;msTog.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));drawMarketStructure();});
  root.appendChild(msTog);
  const msMetricTog=el(`<div class="seg-toggle" id="msMetricTog" style="margin-bottom:8px;display:none"><button data-m="units" class="active">Units</button><button data-m="communities">Communities</button><button data-m="employees">Employees</button></div>`);
  msMetricTog.querySelectorAll('button').forEach(b=>b.onclick=()=>{msMetric=b.dataset.m;msMetricTog.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));drawMarketStructure();});
  root.appendChild(msMetricTog);
  const msGrid=el('<div class="grid two-col"></div>');
  msGrid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px" id="msLeftTitle"></h3><p class="note">Within the 150-provider panel.</p><div class="legend" id="msLeftLeg" style="margin:2px 0 4px"></div><div class="chart-wrap" id="msLeft"></div></div>`));
  msGrid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px" id="msRightTitle"></h3><p class="note" id="msRightNote">Against the entire U.S. market (NIC).</p><div class="legend" id="msRightLeg" style="margin:2px 0 4px"></div><div class="chart-wrap" id="msRight"></div></div>`));
  root.appendChild(msGrid);
  root.appendChild(el('<p class="mini" id="msNote" style="margin-top:6px"></p>'));
  trRedraw();

  // multi-year metric summary table (2020 vs 2026 + change)
  const M=[
    ['Total senior-living units','total_units',fmt,false,true],
    ['U.S. communities','communities',fmt,false,true],
    ['Providers reporting units','providers',fmt,false,false],
    ['Units per community','units_per_comm',fmt1,false,false],
    ['Assisted living — share of segments','al_share',v=>pct(v),true,false],
    ['Independent living — share of segments','il_share',v=>pct(v),true,false],
    ['Memory care — share of segments','mc_share',v=>pct(v),true,false],
    ['Top-10 share of units','top10_share',v=>pct(v),true,false],
    ['Top-25 share of units','top25_share',v=>pct(v),true,false],
    ['Top-50 share of units','top50_share',v=>pct(v),true,false],
    ['Concentration index (HHI)','hhi',fmt,false,false]
  ];
  let rowsH='';
  M.forEach(([lab,key,f,isShare,judge])=>{
    const v0=T0[key],v1=T[key];
    let chg='—',cl='delta-flat';
    if(v0!=null&&v1!=null){const d=v1-v0;
      if(judge)cl=d>0?'delta-pos':(d<0?'delta-neg':'delta-flat');
      const arrow=d>0?'▲':(d<0?'▼':'■');
      chg=`${arrow} ${isShare?pp(d):((d>0?'+':'')+f(d))}`;}
    rowsH+=`<tr><td>${lab}</td><td>${f(v0)}</td><td>${f(v1)}</td><td class="${cl}">${chg}</td></tr>`;
  });
  root.appendChild(el(`<div class="tablecard" style="margin-top:16px"><table><thead><tr><th class="no-sort">Metric</th><th class="no-sort">${YMIN}</th><th class="no-sort">${YMAX}</th><th class="no-sort">Change ${YMIN}→${YMAX}</th></tr></thead><tbody>${rowsH}</tbody></table></div>`));

  root.appendChild(el(`<div class="callout">Across ${YMIN}–${YMAX}, total units are roughly flat-to-modestly-up while the top tier's share of those units has eased — growth is coming as much from the broad middle of the field as from the very largest operators. Share and concentration changes are shown neutrally (they describe the field's shape, not good or bad).</div>`));
  root.appendChild(takeaway([
    `The panel holds <b>~${pct(T.total_units/NIC.ig.u2023,0)} of the U.S. market</b> and is slipping — growth is happening <b>below the top 150</b>, and the care mix is tilting toward <b>independent living</b> for margin.`,
    `The top 10 are <b>${pct(T.top10_share,0)} of the panel</b> but only ~${pct((function(){const ps=DATA.providers.filter(p=>p.year===YMAX&&p.units).sort((a,b)=>b.units-a.units);return ps.slice(0,10).reduce((s,p)=>s+p.units,0)/NIC.ig.u2023;})(),0)} of the whole market — internal concentration looks high; industry-wide it's low.`
  ]));
};

function nicSection(root){
  const wrap=el('<div class="card" style="margin-bottom:16px"></div>');
  wrap.appendChild(el(`<h3 style="margin:0 0 4px">The panel within the U.S. market (NIC)</h3>`));
  const share26=T.total_units/NIC.ig.u2023;
  wrap.appendChild(el(`<p class="note" style="margin:0 0 10px">The ${T.providers}-provider panel holds roughly <b>${pct(share26,0)}</b> of the ~${(NIC.ig.u2023/1e6).toFixed(2)}M investment-grade U.S. seniors-housing units — and that share is slipping as the broader market grows faster than the panel.</p>`));
  const p2020=DATA.trends.find(t=>t.year===2020).total_units, p2024=DATA.trends.find(t=>t.year===2024).total_units;
  const rows1=[['4Q19 (6th ed.)',NIC.ig.u2019,p2020,2020],['4Q23 (7th ed.)',NIC.ig.u2023,p2024,2024]];
  const t1=`<table style="margin:2px 0 4px"><thead><tr><th class="no-sort">NIC benchmark</th><th class="no-sort">U.S. seniors-housing units</th><th class="no-sort">Panel units (nearest yr)</th><th class="no-sort">Panel share</th></tr></thead><tbody>${rows1.map(r=>`<tr><td>${r[0]}</td><td>${fmt(r[1])}</td><td>${fmt(r[2])} (${r[3]})</td><td>${pct(r[2]/r[1],1)}</td></tr>`).join('')}</tbody></table>`;
  const nm=NIC.map, nmt=nm.al+nm.il+nm.mc;
  const rows2=[['Assisted living',T.al_share,nm.al/nmt],['Independent living',T.il_share,nm.il/nmt],['Memory care',T.mc_share,nm.mc/nmt]];
  const t2=`<table style="margin:2px 0 4px"><thead><tr><th class="no-sort">Segment</th><th class="no-sort">Panel (2026)</th><th class="no-sort">NIC MAP universe</th><th class="no-sort">Panel vs NIC</th></tr></thead><tbody>${rows2.map(r=>{const d=r[1]-r[2];return `<tr><td>${r[0]}</td><td>${pct(r[1],0)}</td><td>${pct(r[2],0)}</td><td class="${d>0?'delta-pos':'delta-neg'}">${pp(d)}</td></tr>`;}).join('')}</tbody></table>`;
  const grid=el('<div class="grid two-col"></div>');
  grid.appendChild(el(`<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Share of the U.S. investment-grade market</h4>${t1}<p class="mini">Denominators: NIC Investment Guide, 6th ed. (4Q19) & 7th ed. (4Q23) — seniors-housing units (IL + AL + MC; skilled nursing excluded). Panel report-years aligned to the nearest NIC benchmark.</p></div>`));
  grid.appendChild(el(`<div><h4 style="margin:0 0 6px;font-size:12.5px;color:var(--accent)">Care mix vs the broader market</h4>${t2}<p class="mini">NIC MAP universe = ${fmt(nmt)} open units across ${fmt(nm.operators)} operators / ${fmt(nm.buildings)} buildings (Argentum NIC dataset). The panel over-indexes assisted living & memory care and under-indexes independent living.</p></div>`));
  wrap.appendChild(grid);
  root.appendChild(wrap);
}
function trYears(){return DATA.trends.filter(t=>t.year>=trFrom);}
function trRedraw(){
  const tr=trYears(), xs=tr.map(t=>t.year);
  const u=$('#trUnits'); if(u)u.innerHTML=svgLine([{name:'Total units',color:C.gold,pts:tr.map(t=>[t.year,t.total_units]),area:true}],{xs,fy:v=>(v/1000).toFixed(0)+'k',fp:fmt});
  drawComm();
  const c=$('#trConc'); if(c)c.innerHTML=svgLine([{name:'Top-10 share',color:C.gold,pts:tr.map(t=>[t.year,t.top10_share])},{name:'Top-25 share',color:C.blue,pts:tr.map(t=>[t.year,t.top25_share])},{name:'Top-50 share',color:C.teal,pts:tr.map(t=>[t.year,t.top50_share])}],{xs,zero:false,fy:v=>pct(v,0),fp:v=>pct(v)});
  const h=$('#trHHI'); if(h)h.innerHTML=svgLine([{name:'HHI',color:C.orange,pts:tr.map(t=>[t.year,t.hhi])}],{xs,zero:true,fy:fmt,fp:fmt});
  drawMarketStructure();
}
const _swleg=arr=>arr.map(([c,l])=>`<div><span class="sw" style="background:${c}"></span>${l}</div>`).join('');
function drawMarketStructure(){
  const L=$('#msLeft'), R=$('#msRight'); if(!L||!R)return;
  const mt=$('#msMetricTog'); if(mt)mt.style.display=msMode==='concentration'?'':'none';
  const tr=DATA.trends.filter(t=>t.year>=trFrom), xs=tr.map(t=>t.year);
  const setTitles=(lt,rt,note)=>{$('#msLeftTitle').textContent=lt;$('#msRightTitle').textContent=rt;$('#msNote').innerHTML=note;};
  if(msMode==='migration'){
    const rb=rankBandShares().filter(x=>x.year>=trFrom);
    L.innerHTML=svgLine([{name:'Top 10',color:C.gold,pts:rb.map(x=>[x.year,x.b1])},{name:'11–25',color:C.blue,pts:rb.map(x=>[x.year,x.b2])},{name:'26–50',color:C.teal,pts:rb.map(x=>[x.year,x.b3])},{name:'51–150',color:C.violet,pts:rb.map(x=>[x.year,x.b4])}],{xs,zero:false,fy:v=>pct(v,0),fp:v=>pct(v)});
    const ps=DATA.providers.filter(p=>p.year===YMAX&&p.units).sort((a,b)=>b.units-a.units), bu=(a,b)=>ps.slice(a,b).reduce((s,p)=>s+p.units,0), nic=NIC.ig.u2023;
    R.innerHTML=svgHBars([['Top 10',bu(0,10)],['Ranks 11–25',bu(10,25)],['Ranks 26–50',bu(25,50)],['Ranks 51–150',bu(50,150)]].map(([lab,u],i)=>({label:lab,value:u/nic*100,color:[C.gold,C.blue,C.teal,C.violet][i]})),{w:560,rh:26,lw:110,clip:40,fv:v=>v.toFixed(1)+'%'});
    const lg=_swleg([[C.gold,'Top 10'],[C.blue,'11–25'],[C.teal,'26–50'],[C.violet,'51–150']]);
    $('#msLeftLeg').innerHTML=lg; $('#msRightLeg').innerHTML='';
    setTitles('Where share is moving — by rank band','Each band as a share of the U.S. market ('+YMAX+')','Market denominator: NIC Investment Guide, 7th ed. (4Q23) ≈ '+(NIC.ig.u2023/1e6).toFixed(2)+'M U.S. seniors-housing units. The top 10 hold ~'+pct(bu(0,10)/nic,0)+' of the whole market vs '+pct(T.top10_share,0)+' of the panel.');
  } else if(msMode==='concentration'){
    const s=topNShare(msMetric).filter(x=>x.year>=trFrom);
    L.innerHTML=svgLine([{name:'Top 10',color:C.gold,pts:s.map(x=>[x.year,x.t10])},{name:'Top 25',color:C.blue,pts:s.map(x=>[x.year,x.t25])},{name:'Top 50',color:C.teal,pts:s.map(x=>[x.year,x.t50])}],{xs,zero:false,fy:v=>pct(v,0),fp:v=>pct(v)});
    const nic=NIC.ig.u2023;
    R.innerHTML=svgHBars([['Top 10',T.top10],['Top 25',T.top25],['Top 50',T.top50],['Full panel (150)',T.total_units]].map(([lab,u],i)=>({label:lab,value:u/nic*100,color:[C.gold,C.blue,C.teal,C.green][i]})),{w:560,rh:26,lw:130,clip:40,fv:v=>v.toFixed(1)+'%'});
    const lg=_swleg([[C.gold,'Top 10'],[C.blue,'Top 25'],[C.teal,'Top 50']]);
    $('#msLeftLeg').innerHTML=lg; $('#msRightLeg').innerHTML='';
    setTitles('Top 10 / 25 / 50 share of the panel ('+({units:'units',communities:'communities',employees:'employees'}[msMetric])+')','Panel tiers as a share of the U.S. market ('+YMAX+')','Right-hand market share uses units only against NIC Investment Guide 4Q23 ('+(NIC.ig.u2023/1e6).toFixed(2)+'M). The full 150-provider panel is ~'+pct(T.total_units/nic,0)+' of the U.S. market.');
  } else {
    L.innerHTML=svgLine([{name:'AL',color:C.blue,pts:tr.map(t=>[t.year,t.al_share])},{name:'IL',color:C.teal,pts:tr.map(t=>[t.year,t.il_share])},{name:'MC',color:C.violet,pts:tr.map(t=>[t.year,t.mc_share])}],{xs,zero:true,ymax:0.55,fy:v=>pct(v,0),fp:v=>pct(v)});
    const nm=NIC.map, nmt=nm.al+nm.il+nm.mc;
    R.innerHTML=svgGroupBars([{label:'Assisted Living',vals:{p:T.al_share*100,n:nm.al/nmt*100}},{label:'Independent',vals:{p:T.il_share*100,n:nm.il/nmt*100}},{label:'Memory Care',vals:{p:T.mc_share*100,n:nm.mc/nmt*100}}],[{key:'p',name:'Panel',color:C.gold},{key:'n',name:'NIC',color:C.grey}],{h:240,max:50,fy:v=>v.toFixed(0)+'%',fp:v=>v.toFixed(0)+'%'});
    $('#msLeftLeg').innerHTML=_swleg([[C.blue,'Assisted Living'],[C.teal,'Independent Living'],[C.violet,'Memory Care']]);
    $('#msRightLeg').innerHTML=_swleg([[C.gold,'Panel ('+YMAX+')'],[C.grey,'NIC market']]);
    setTitles('Care-segment mix over time (panel)','Panel vs the NIC market','Market mix = NIC MAP universe ('+fmt(nmt)+' open units, Argentum NIC dataset). The panel over-indexes AL & memory care and under-indexes independent living.');
  }
}
function drawComm(){
  const w=$('#trComm'); if(!w)return; const tr=trYears(), xs=tr.map(t=>t.year);
  if(commMode==='total')w.innerHTML=svgLine([{name:'Communities',color:C.blue,pts:tr.map(t=>[t.year,t.communities])}],{xs,zero:false,fy:fmt,fp:fmt})+`<p class="mini" style="margin-top:4px">Total reported communities across the panel each year.</p>`;
  else w.innerHTML=svgLine([{name:'Units per community',color:C.teal,pts:tr.map(t=>[t.year,t.units_per_comm])}],{xs,zero:false,fy:v=>fmt1(v),fp:v=>fmt1(v)})+`<p class="mini" style="margin-top:4px">Average units per community (campus density).</p>`;
}
function drawTopN(){
  const w=$('#trTopN'); if(!w)return; const s=topNShare(topMetric).filter(x=>x.year>=trFrom), xs=s.map(x=>x.year);
  w.innerHTML=svgLine([{name:'Top 10',color:C.gold,pts:s.map(x=>[x.year,x.t10])},{name:'Top 25',color:C.blue,pts:s.map(x=>[x.year,x.t25])},{name:'Top 50',color:C.teal,pts:s.map(x=>[x.year,x.t50])}],{xs,zero:false,fy:v=>pct(v,0),fp:v=>pct(v)});
}

/* ---- Geography ---- */
let geoYear=2026, geoSel=null;
RENDER.geography=()=>{
  const root=$('#tab-geography');
  root.appendChild(el(`<h2 class="section">Geographic footprint</h2>`));

};
function geoMigration(){
  const host=$('#geoMig'); if(!host)return; host.innerHTML='';

  const both=new Set([...set24].filter(k=>set26.has(k)));
  const regSum=yr=>{const o={Northeast:0,Midwest:0,South:0,West:0};DATA.geo_detail.filter(g=>g.year===yr&&both.has(canon(g.provider))).forEach(g=>{const r=STATE_REGION[g.st];if(r)o[r]+=g.c||0;});return o;};
  const r24=regSum(2024), r26=regSum(2026);
  const tot24=Object.values(r24).reduce((a,b)=>a+b,0)||1, tot26=Object.values(r26).reduce((a,b)=>a+b,0)||1;
  const regs=['South','West','Midwest','Northeast'];

  const grid=el('<div class="grid two-col"></div>');
  const c1=el(`<div class="card chart-card"><h3 style="font-size:14px">Regional mix — like-for-like (${both.size} operators reporting both years)</h3><p class="note">Share of these operators' communities by Census region. The mix barely moves — South-weighted and steady.</p><div class="legend" style="margin:2px 0 4px"><span><span class="sw" style="background:${C.grey}"></span>2024</span><span style="margin-left:12px"><span class="sw" style="background:${C.gold}"></span>2026</span></div><div class="chart-wrap">${svgGroupBars(rg,[{key:'y24',name:'2024',color:C.grey},{key:'y26',name:'2026',color:C.gold}],{fy:v=>v.toFixed(0)+'%',fp:v=>v.toFixed(0)+'%'})}</div></div>`);
  grid.appendChild(c1);
  // apparent net change by state (coverage-affected) — gainers/decliners
  const dchg=DATA.geo_states.filter(s=>s.st!=='BC'&&((s.c2024||0)||(s.c2026||0))).map(s=>({st:s.st,d:(s.c2026||0)-(s.c2024||0)})).filter(x=>x.d!==0);
  const gain=dchg.filter(x=>x.d>0).sort((a,b)=>b.d-a.d).slice(0,9);
  const lose=dchg.filter(x=>x.d<0).sort((a,b)=>a.d-b.d).slice(0,9);
  const items=[...gain,...lose].sort((a,b)=>b.d-a.d).map(x=>({label:x.st,value:x.d}));
  grid.appendChild(el(`<div class="card chart-card"><h3 style="font-size:14px">Apparent net community change by state, 2024→2026</h3><p class="note" style="border-left:3px solid var(--yellow);padding-left:8px">Coverage-affected — most declines reflect fewer providers reporting state detail, not real exits. <span style="color:${C.green}">Gains</span> flow down to <span style="color:${C.red}">declines</span>. Read as directional only.</p><div class="chart-wrap">${svgDivBars(items,{w:580,rh:17})}</div></div>`));
  host.appendChild(grid);
  host.appendChild(el(`<div class="callout">On a like-for-like basis the panel's geography is a <strong>stable, South-weighted clustering</strong> (South ~${pct(r26.South/tot26,0)}, West ~${pct(r26.West/tot26,0)}), not a migration. California, Florida, Texas and Illinois remain the largest single-state footprints. A complete state list in the survey would unlock a genuine geographic trend series.</div>`));

  // ---- Operator headquarters (where companies are based, vs where they operate) ----
